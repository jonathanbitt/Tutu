<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Italiano — Aula</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ========== TODOS OS ESTILOS ========== */
:root{
    --verde:#1a6b4a;
    --verde-claro:#e8f5ef;
    --amarelo:#fff3a3;
    --cinza-bg:#f7f6f2;
    --texto:#1c1c1c;
}
*{ box-sizing:border-box; margin:0; padding:0; }
body{ font-family:'DM Sans',sans-serif; background:var(--cinza-bg); color:var(--texto); }

.container{
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}

.video-area{
    width:100%;
    background:#0f1f17;
    padding:16px 24px;
    flex-shrink:0;
    height:33vh;
    min-height:260px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:6px;
    border-bottom:3px solid var(--verde);
    transition: all 0.3s ease;
}
.video-area.oculto { display: none; }

video{ 
    width:100%; 
    height:auto;
    max-height:calc(33vh - 40px);
    border-radius:14px; 
    background:black; 
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
    object-fit:contain;
}
.progresso-label{ 
    color:#7fb99a; 
    font-size:0.7rem; 
    text-align:right; 
    margin-top:-2px;
}

.texto-area{
    flex:1;
    background:white;
    overflow-y:auto;
    padding:16px 24px 100px;
    font-size:17px;
    line-height:1.85;
    scroll-behavior:smooth;
    transition: all 0.3s ease;
}
.texto-area.expandido { flex: 1; height: 100vh; }
.texto-area::-webkit-scrollbar{ width:5px; }
.texto-area::-webkit-scrollbar-track{ background:#f0f0f0; }
.texto-area::-webkit-scrollbar-thumb{ background:#b5d4c5; border-radius:4px; }

.bloco{ margin-bottom:20px; padding:14px 16px; border-radius:14px; transition:all 0.35s ease; border:1.5px solid #ebebeb; background:white; }
.bloco.ativo{ background:var(--amarelo); border-color:#e0c93a; box-shadow:0 4px 20px rgba(224,201,58,0.25); transform:scale(1.01); }

.italian{ margin-bottom:6px; font-family:'Lora',serif; font-size:0.98rem; color:#1c1c1c; }

.toggle-btn{ display:none; }

.colapsavel{ overflow:hidden; max-height:0; opacity:0; transition:max-height 0.4s ease, opacity 0.3s ease; }
.colapsavel.aberto{ max-height:400px; opacity:1; margin-top:8px; }

.traducao{
    color:#555; font-style:italic; background:#f4f4f0;
    padding:8px 10px; border-radius:10px;
    font-size:0.88rem; border-left:3px solid #b5d4c5;
}
.dica{
    background:#fffbea; border:1px solid #f0e060;
    border-radius:10px; padding:8px 10px;
    font-size:0.82rem; color:#4a3f00; line-height:1.55;
}

details{ border-radius:10px; margin-top:8px; overflow:hidden; border:1px solid #e2ede8; }
summary{
    cursor:pointer; font-weight:700; font-size:0.82rem;
    padding:8px 12px; background:#eaf4ef; color:var(--verde);
    user-select:none; list-style:none; display:flex;
    align-items:center; gap:6px; transition:background 0.2s;
}
summary:hover{ background:#d6ede3; }
summary::after{ content:'▾'; margin-left:auto; font-size:0.9rem; transition:transform 0.3s; }
details[open] summary::after{ transform:rotate(180deg); }
.mini-aula-corpo{ padding:10px 12px; background:#f9fdf9; font-size:0.85rem; line-height:1.65; color:#2a2a2a; }
.mini-aula-corpo strong{ color:var(--verde); }

.timestamp{
    color:var(--verde); cursor:pointer; font-weight:700;
    font-family:'DM Sans',sans-serif; font-size:0.75rem;
    background:#e8f5ef; padding:2px 6px; border-radius:6px;
    margin-right:6px; transition:background 0.2s;
}
.timestamp:hover{ background:var(--verde); color:white; }

/* ========== FLOATING CONTROLS — NOVO DESIGN ========== */

/* Botão de toggle flutuante */
.fc-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 10000;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(15,31,23,0.95);
    border: 1.5px solid #2a4a35;
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    transition: transform 0.25s ease, background 0.2s;
    outline: none;
}
.fc-toggle:hover {
    background: #1a3d2b;
    transform: scale(1.08);
}
.fc-toggle.aberto {
    transform: rotate(45deg) scale(1.05);
    background: #1a6b4a;
}

/* Painel expandido */
.floating-controls {
    position: fixed;
    bottom: 78px;
    right: 20px;
    z-index: 9999;
    background: rgba(15,31,23,0.97);
    padding: 10px 12px;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: stretch;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    border: 1px solid #2a4a35;
    width: 180px;

    /* Estado retraído */
    opacity: 0;
    pointer-events: none;
    transform: translateY(12px) scale(0.96);
    transform-origin: bottom right;
    transition: opacity 0.22s ease, transform 0.22s cubic-bezier(.4,0,.2,1);
}
.floating-controls.aberto {
    opacity: 1;
    pointer-events: all;
    transform: translateY(0) scale(1);
}

/* Linha de botões agrupados */
.fc-row {
    display: flex;
    gap: 4px;
    align-items: center;
}

.floating-controls button,
.floating-controls select {
    border: none;
    padding: 6px 8px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 700;
    background: #2a4a35;
    color: white;
    transition: background 0.2s;
    font-family: 'DM Sans', sans-serif;
    flex: 1;
    text-align: center;
    white-space: nowrap;
}
.floating-controls button:hover { background: var(--verde); }
.floating-controls select {
    background: #2a4a35;
    color: white;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    width: 100%;
    flex: unset;
}

.fc-label {
    font-size: 0.58rem;
    color: #5a9a7a;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 700;
    margin-bottom: 1px;
    padding: 0 2px;
}
.fc-divider {
    height: 1px;
    background: rgba(255,255,255,0.07);
    margin: 2px 0;
}

.btn-home { background: #1a3a6a !important; }
.btn-home:hover { background: #1f6feb !important; }

@media(max-width:900px){
    .video-area{ min-height:220px; padding:12px 16px; }
    video{ max-height:calc(33vh - 30px); }
    .texto-area{ padding:12px 16px 80px; }
    .bloco{ padding:12px 14px; margin-bottom:16px; }
    .global-toggles{ margin-bottom:16px; gap:6px; }
    .global-btn{ padding:4px 10px; font-size:0.68rem; }
    .floating-controls { right: 16px; bottom: 74px; width: 170px; }
    .fc-toggle { right: 16px; bottom: 16px; }
}

.quizlet-cta{
    margin-top: 24px;
    margin-bottom: 12px;
    border-radius: 14px;
    background: linear-gradient(135deg, #0f1f17 0%, #1a3d2b 100%);
    border: 1.5px solid #2a5c3f;
    overflow: hidden;
}
.quizlet-cta-inner{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 12px 16px;
    flex-wrap: wrap;
}
.quizlet-cta-text{
    display: flex;
    align-items: center;
    gap: 8px;
    color: #e8f5ef;
}
.quizlet-cta-icon{ font-size: 1.4rem; flex-shrink: 0; }
.quizlet-cta-text strong{ display: block; font-size: 0.85rem; color: #e8f5ef; margin-bottom: 2px; }
.quizlet-cta-text p{ font-size: 0.65rem; color: #7fb99a; margin: 0; }
.quizlet-btn{
    background: #3fb950;
    color: #0d1117;
    border: none;
    padding: 6px 14px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
}
.quizlet-btn:hover{
    background: #52d363;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(63,185,80,0.35);
}

/* Modais */
.qmodal{
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s ease;
}
@keyframes fadeIn{
    from{ opacity:0; }
    to{ opacity:1; }
}
.qmodal-overlay{
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
}
.qmodal-box{
    position: relative;
    width: 94vw;
    max-width: 860px;
    height: 90vh;
    background: #0d1117;
    border-radius: 20px;
    overflow: hidden;
    border: 1.5px solid #30363d;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    animation: slideUp 0.3s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp{
    from{ transform: translateY(40px); opacity:0; }
    to{ transform: translateY(0); opacity:1; }
}
.qmodal-close{
    position: absolute;
    top: 12px;
    right: 14px;
    z-index: 10;
    background: rgba(255,255,255,0.08);
    border: none;
    color: #e6edf3;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
}
.qmodal-close:hover{ background: rgba(248,81,73,0.3); }
.qmodal-frame{
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}

/* Botão microfone — oculto inline, usado via painel flutuante */
.mic-btn { display: none; }
.mic-btn.gravando {
    background: #ffeaea;
    border-color: #e05c5c;
    color: #c0392b;
    animation: pulso 1s infinite;
}
@keyframes pulso {
    0%, 100% { box-shadow: 0 0 0 0 rgba(224,92,92,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(224,92,92,0); }
}

.mic-resultado {
    margin-top: 8px;
    padding: 8px 10px;
    border-radius: 10px;
    font-size: 0.82rem;
    line-height: 1.5;
    display: none;
}
.mic-resultado.acerto { background: #e8f5ef; border: 1px solid #5cb85c; color: #1a6b3a; display: block; }
.mic-resultado.erro { background: #fff0f0; border: 1px solid #e05c5c; color: #8b1a1a; display: block; }
.mic-resultado.parcial { background: #fffbea; border: 1px solid #e0c93a; color: #5a4a00; display: block; }

/* Anotações — botão inline oculto, usado via painel flutuante */
.nota-btn { display: none; }

.nota-modal {
    position: fixed;
    inset: 0;
    z-index: 99998;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn 0.2s ease;
}
.nota-modal-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(3px);
}
.nota-modal-box {
    position: relative;
    width: 100%;
    max-width: 680px;
    max-height: 90vh;
    background: #fffdf8;
    border-radius: 24px 24px 0 0;
    overflow-y: auto;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.2);
    animation: slideUpEx 0.32s cubic-bezier(.4,0,.2,1);
    display: flex;
    flex-direction: column;
}
.nota-modal-header {
    padding: 18px 20px 12px;
    border-bottom: 1px solid #f0e8d8;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    background: #fffdf8;
    z-index: 2;
}
.nota-modal-titulo { font-size: 0.78rem; font-weight: 700; color: #b05000; text-transform: uppercase; letter-spacing: 0.05em; }
.nota-modal-ref { font-size: 0.72rem; color: #999; font-style: italic; margin-top: 2px; max-width: 80%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nota-modal-close { background: #f0e8d8; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0; }
.nota-modal-close:hover { background: #e0d0b8; }

.nota-lista { flex: 1; padding: 14px 20px; display: flex; flex-direction: column; gap: 10px; }
.nota-item { background: white; border: 1px solid #f0e0c8; border-radius: 14px; padding: 12px 14px; position: relative; }
.nota-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.nota-item-data { font-size: 0.65rem; color: #bbb; font-style: italic; }
.nota-item-tipo { font-size: 0.62rem; font-weight: 700; padding: 2px 7px; border-radius: 20px; text-transform: uppercase; }
.tipo-texto  { background: #fff5e8; color: #b05000; }
.tipo-link   { background: #e8f0fe; color: #1a56a0; }
.tipo-video  { background: #ffeaea; color: #c0392b; }
.nota-item-conteudo { font-size: 0.88rem; line-height: 1.6; color: #333; word-break: break-word; }
.nota-item-conteudo .yt-embed { margin-top: 8px; border-radius: 10px; overflow: hidden; aspect-ratio: 16/9; background: #000; }
.nota-item-conteudo .yt-embed iframe { width: 100%; height: 100%; border: none; display: block; }
.nota-item-apagar { position: absolute; top: 10px; right: 10px; background: transparent; border: none; cursor: pointer; font-size: 0.8rem; opacity: 0.35; transition: opacity 0.2s; padding: 2px 4px; }
.nota-item-apagar:hover { opacity: 1; color: #e05c5c; }
.nota-vazia { text-align: center; color: #ccc; font-size: 0.85rem; padding: 30px 0; }
.nota-vazia span { font-size: 2rem; display: block; margin-bottom: 8px; }

.nota-form { padding: 14px 20px 20px; border-top: 1px solid #f0e8d8; background: #fffdf8; flex-shrink: 0; position: sticky; bottom: 0; }
.nota-form-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
.nota-tab { flex: 1; padding: 6px 8px; border-radius: 10px; border: 1.5px solid #e0d0b8; background: transparent; font-size: 0.72rem; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; color: #999; transition: all 0.18s; }
.nota-tab.ativo { background: #fff5e8; border-color: #f0a050; color: #b05000; }
.nota-form-campo { display: none; flex-direction: column; gap: 8px; }
.nota-form-campo.ativo { display: flex; }
.nota-input, .nota-textarea { width: 100%; border: 1.5px solid #e0d0b8; border-radius: 10px; padding: 9px 12px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none; background: white; color: #1c1c1c; transition: border-color 0.2s; resize: none; }
.nota-input:focus, .nota-textarea:focus { border-color: #f0a050; }
.nota-textarea { min-height: 80px; line-height: 1.5; }
.nota-salvar { width: 100%; padding: 10px; border-radius: 12px; border: none; background: #e07010; color: white; font-weight: 700; font-size: 0.88rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s; margin-top: 4px; }
.nota-salvar:hover { background: #c06000; }

/* Exercícios — botão inline oculto, usado via painel flutuante */
.ex-btn { display: none; }

.exmodal {
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn 0.2s ease;
}
.exmodal-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(3px);
}
.exmodal-box {
    position: relative;
    width: 100%;
    max-width: 680px;
    max-height: 88vh;
    background: #fff;
    border-radius: 24px 24px 0 0;
    overflow-y: auto;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.25);
    animation: slideUpEx 0.32s cubic-bezier(.4,0,.2,1);
    padding: 24px 20px 32px;
}
@keyframes slideUpEx {
    from { transform: translateY(60px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
}
.exmodal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.exmodal-titulo { font-size: 0.78rem; font-weight: 700; color: #1a56a0; text-transform: uppercase; letter-spacing: 0.05em; }
.exmodal-close { background: #f0f0f0; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
.exmodal-close:hover { background: #e0e0e0; }

.ex-progresso { font-size: 0.7rem; color: #999; margin-bottom: 16px; }
.ex-progresso-bar { height: 4px; background: #eee; border-radius: 4px; margin-bottom: 18px; overflow: hidden; }
.ex-progresso-fill { height: 100%; background: var(--verde); border-radius: 4px; transition: width 0.4s ease; }

.ex-tipo-badge {
    display: inline-block;
    font-size: 0.62rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
}
.badge-multipla  { background: #e8f0fe; color: #1a56a0; }
.badge-lacuna    { background: #fce8ff; color: #7a1fa0; }
.badge-ordenar   { background: #fff3cd; color: #7a5500; }
.badge-traduzir  { background: #e8f5ef; color: #1a6b4a; }
.badge-pronuncia { background: #f0e6ff; color: #6a1a9e; }

.ex-pergunta { font-family: 'Lora', serif; font-size: 1.05rem; line-height: 1.6; color: #1c1c1c; margin-bottom: 18px; }
.ex-pergunta em { color: var(--verde); font-style: normal; font-weight: 600; }

.ex-pronuncia-area {
    text-align: center;
    padding: 20px;
    background: #f9f6ff;
    border-radius: 16px;
    margin: 10px 0;
}
.ex-palavra-destaque {
    font-family: 'Lora', serif;
    font-size: 1.8rem;
    font-weight: 600;
    color: #6a1a9e;
    margin-bottom: 20px;
    padding: 15px;
    background: white;
    border-radius: 12px;
    border: 2px solid #d4b8ff;
    display: inline-block;
    width: 100%;
}
.ex-pronuncia-botoes {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 15px 0;
}
.ex-ouvir-btn {
    background: #6a1a9e;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
}
.ex-ouvir-btn:hover { background: #8b3ac4; transform: scale(1.02); }
.ex-gravar-btn {
    background: #4a4a4a;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
}
.ex-gravar-btn.gravando {
    background: #e05c5c;
    animation: pulso 1s infinite;
}
.ex-gravar-btn:hover { background: #666; }
.ex-dica-pronuncia {
    margin-top: 10px;
    font-size: 0.8rem;
    color: #666;
    text-align: center;
}

.ex-opcoes { display: flex; flex-direction: column; gap: 8px; }
.ex-opcao {
    padding: 10px 14px;
    border-radius: 12px;
    border: 1.5px solid #ddd;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.18s;
    background: #fafafa;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
}
.ex-opcao:hover:not(:disabled) { border-color: #a0c4f8; background: #e8f0fe; }
.ex-opcao.certa  { background: #e8f5ef; border-color: #5cb85c; color: #1a6b3a; font-weight: 700; }
.ex-opcao.errada { background: #fff0f0; border-color: #e05c5c; color: #8b1a1a; }
.ex-opcao:disabled { cursor: default; }

.ex-lacuna-wrap { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.ex-lacuna-input {
    border: none;
    border-bottom: 2px solid #a0c4f8;
    outline: none;
    font-size: 1rem;
    font-family: 'Lora', serif;
    padding: 2px 4px;
    width: 140px;
    text-align: center;
    background: transparent;
    color: #1c1c1c;
    transition: border-color 0.2s;
}
.ex-lacuna-input:focus { border-color: #1a56a0; }
.ex-lacuna-input.certa { border-color: #5cb85c; color: #1a6b3a; font-weight: 700; }
.ex-lacuna-input.errada { border-color: #e05c5c; color: #8b1a1a; }

.ex-palavras-area { display: flex; flex-wrap: wrap; gap: 6px; min-height: 44px; margin-bottom: 10px; }

.ex-proximo {
    flex: 1;
    padding: 10px 16px;

    background: transparent;
    color: var(--verde);
    font-weight: 700;
    font-size: 0.88rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;

}
.ex-proximo:hover { background: var(--verde-claro); }

.ex-placar { text-align: center; padding: 20px 0; }
.ex-placar-emoji { font-size: 3rem; margin-bottom: 8px; }
.ex-placar-titulo { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; color: #1c1c1c; }
.ex-placar-sub { font-size: 0.85rem; color: #666; }
.ex-placar-score { font-size: 2rem; font-weight: 700; color: var(--verde); margin: 12px 0; }
.ex-reiniciar { margin-top: 16px; padding: 10px 24px; border-radius: 12px; border: none; background: var(--verde); color: white; font-weight: 700; font-size: 0.9rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s; }
.ex-reiniciar:hover { background: #145c3d; }

/* ========== PAINEL DE AÇÕES — ESQUERDO ========== */

.fa-toggle {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 10000;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(26,42,90,0.95);
    border: 1.5px solid #3a5abf;
    color: white;
    font-size: 1.15rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    transition: transform 0.25s ease, background 0.2s;
    outline: none;
}
.fa-toggle:hover { background: #1a2f80; transform: scale(1.08); }
.fa-toggle.aberto { transform: rotate(45deg) scale(1.05); background: #1a56a0; }

/* Badge de notas no botão toggle */
.fa-toggle .fa-badge {
    position: absolute;
    top: -3px; right: -3px;
    background: #e07010;
    color: white;
    border-radius: 50%;
    width: 16px; height: 16px;
    font-size: 0.6rem;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    border: 2px solid white;
    pointer-events: none;
}

.fa-painel {
    position: fixed;
    bottom: 78px;
    left: 20px;
    z-index: 9999;
    background: rgba(14,22,50,0.97);
    padding: 10px 12px;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: stretch;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    border: 1px solid #2a3a7a;
    width: 200px;
    opacity: 0;
    pointer-events: none;
    transform: translateY(12px) scale(0.96);
    transform-origin: bottom left;
    transition: opacity 0.22s ease, transform 0.22s cubic-bezier(.4,0,.2,1);
}
.fa-painel.aberto {
    opacity: 1;
    pointer-events: all;
    transform: translateY(0) scale(1);
}

.fa-label {
    font-size: 0.58rem;
    color: #7a9adf;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 700;
    padding: 0 2px;
    margin-bottom: 1px;
}
.fa-divider {
    height: 1px;
    background: rgba(255,255,255,0.07);
    margin: 2px 0;
}
.fa-row {
    display: flex;
    gap: 4px;
}

/* Botões do painel de ações */
.fa-btn {
    border: none;
    padding: 7px 10px;
    border-radius: 9px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 700;
    background: #1e2f6a;
    color: white;
    transition: background 0.2s;
    font-family: 'DM Sans', sans-serif;
    text-align: center;
    width: 100%;
    white-space: nowrap;
}
.fa-btn:hover { background: #2a4ab0; }

/* Cores temáticas por ação */
.fa-btn.verde   { background: #1a4a30; }
.fa-btn.verde:hover { background: #1a6b4a; }
.fa-btn.amarelo { background: #4a3a00; }
.fa-btn.amarelo:hover { background: #7a6000; }
.fa-btn.roxo    { background: #3a1a60; }
.fa-btn.roxo:hover { background: #6a1a9e; }
.fa-btn.azul    { background: #0f2a60; }
.fa-btn.azul:hover { background: #1a56a0; }
.fa-btn.laranja { background: #4a2200; }
.fa-btn.laranja:hover { background: #b05000; }

/* Indicador do parágrafo ativo */
.fa-paragrafo-info {
    font-size: 0.65rem;
    color: #7a9adf;
    text-align: center;
    padding: 4px 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* Badge de notas no botão de anotações do painel */
.fa-nota-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #e07010;
    color: white;
    border-radius: 50%;
    width: 14px; height: 14px;
    font-size: 0.58rem;
    font-weight: 700;
    margin-left: 4px;
    vertical-align: middle;
}

@media(max-width:900px){
    .fa-toggle { left: 16px; bottom: 16px; }
    .fa-painel  { left: 16px; bottom: 74px; width: 190px; }
}
</style>
</head>
<body>

<div class="container">
    <div class="video-area">
        <video id="video" controls>
            <source id="videoSource" src="" type="video/mp4">
        </video>
        <p class="progresso-label" id="progressoLabel">Carregando...</p>
    </div>

    <div class="texto-area" id="texto">
        <div id="blocosContainer"></div>
    </div>
</div>

<!-- MODAL ANOTAÇÕES -->
<div id="notaModal" class="nota-modal" style="display:none">
    <div class="nota-modal-overlay" onclick="fecharNotas()"></div>
    <div class="nota-modal-box">
        <div class="nota-modal-header">
            <div>
                <div class="nota-modal-titulo">📝 Anotações</div>
                <div class="nota-modal-ref" id="notaModalRef"></div>
            </div>
            <button class="nota-modal-close" onclick="fecharNotas()">✕</button>
        </div>
        <div class="nota-lista" id="notaLista"></div>
        <div class="nota-form">
            <div class="nota-form-tabs">
                <button class="nota-tab ativo" onclick="trocarTabNota('texto', this)">📝 Texto</button>
                <button class="nota-tab" onclick="trocarTabNota('link', this)">🔗 Link</button>
                <button class="nota-tab" onclick="trocarTabNota('video', this)">▶️ YouTube</button>
            </div>
            <div class="nota-form-campo ativo" id="nota-campo-texto">
                <textarea class="nota-textarea" id="nota-input-texto" placeholder="Escreva sua anotação..." rows="3"></textarea>
            </div>
            <div class="nota-form-campo" id="nota-campo-link">
                <input class="nota-input" id="nota-input-link-url" type="url" placeholder="https://..." />
                <input class="nota-input" id="nota-input-link-label" type="text" placeholder="Descrição (opcional)" />
                <div class="nota-form-hint">Cole a URL e adicione uma descrição para identificar o link.</div>
            </div>
            <div class="nota-form-campo" id="nota-campo-video">
                <input class="nota-input" id="nota-input-yt" type="url" placeholder="https://youtube.com/watch?v=..." />
                <div class="nota-form-hint">Cole o link do YouTube — o vídeo será incorporado diretamente.</div>
            </div>
            <button class="nota-salvar" onclick="salvarNota()">+ Salvar anotação</button>
        </div>
    </div>
</div>

<!-- MODAL EXERCÍCIOS -->
<div id="exModal" class="exmodal" style="display:none">
    <div class="exmodal-overlay" onclick="fecharExercicios()"></div>
    <div class="exmodal-box">
        <div class="exmodal-header">
            <span class="exmodal-titulo">✏️ Exercícios</span>
            <button class="exmodal-close" onclick="fecharExercicios()">✕</button>
        </div>
        <div class="ex-progresso" id="exProgresso">Questão 1 de 4</div>
        <div class="ex-progresso-bar"><div class="ex-progresso-fill" id="exProgressoFill" style="width:0%"></div></div>
        <div id="exCorpo"></div>
    </div>
</div>

<div id="quizletModal" class="qmodal" style="display:none">
    <div class="qmodal-overlay" onclick="fecharQuizlet()"></div>
    <div class="qmodal-box">
        <button class="qmodal-close" onclick="fecharQuizlet()">✕</button>
        <iframe id="quizletFrame" src="" frameborder="0" class="qmodal-frame"></iframe>
    </div>
</div>

<!-- FLOATING CONTROLS: painel expansível + botão toggle -->
<div class="floating-controls" id="floatingControls">
    <div class="fc-label">Reprodução</div>
    <div class="fc-row">
        <button onclick="video.play()" title="Play">▶ Play</button>
        <button onclick="video.pause()" title="Pause">⏸ Pause</button>
    </div>
    <div class="fc-row">
        <button onclick="video.currentTime -= 5" title="Voltar 5s">⏪ −5s</button>
        <button onclick="video.currentTime += 5" title="Avançar 5s">⏩ +5s</button>
    </div>
    <div class="fc-divider"></div>
    <div class="fc-label">Navegação</div>
    <div class="fc-row">
        <button onclick="previousParagraph()" title="Parágrafo anterior">⬆ Anterior</button>
        <button onclick="nextParagraph()" title="Próximo parágrafo">⬇ Próximo</button>
    </div>
    <button id="toggleScrollBtn" onclick="toggleAutoScroll()" style="width:100%">🔒 Auto-scroll</button>
    <div class="fc-divider"></div>
    <div class="fc-label">Velocidade</div>
    <select id="speedControl">
        <option value="0.6">0.6×</option>
        <option value="0.75">0.75×</option>
        <option value="1" selected>1× (normal)</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
    </select>
    <div class="fc-divider"></div>
    <button onclick="voltarHome()" class="btn-home" style="width:100%">📚 Biblioteca</button>
    <div class="fc-divider"></div>
    <button onclick="toggleVideo()" id="btnToggleVideo" style="width:100%;background:#1a3030">🎥 Ocultar vídeo</button>
</div>

<!-- Botão flutuante de toggle -->
<button class="fc-toggle" id="fcToggle" onclick="toggleControls()" title="Controles">＋</button>

<!-- PAINEL DE AÇÕES — ESQUERDO -->
<div class="fa-painel" id="faPainel">
    <div class="fa-paragrafo-info" id="faParagrafoInfo">Nenhum parágrafo ativo</div>
    <div class="fa-divider"></div>
    <div class="fa-label">Conteúdo</div>
    <div class="fa-row">
        <button class="fa-btn verde" id="faBtnTrad" onclick="faToogleTrad()">🌐 Tradução</button>
        <button class="fa-btn amarelo" id="faBtnDica" onclick="faToogleDica()">💡 Dica</button>
    </div>
    <div class="fa-divider"></div>
    <div class="fa-label">Ações do parágrafo</div>
    <button class="fa-btn roxo" id="faBtnMic" onclick="faAcaoMic()">🎙️ Praticar Fala</button>
    <button class="fa-btn azul"  id="faBtnEx"  onclick="faAcaoEx()">✏️ Exercícios</button>
    <button class="fa-btn laranja" id="faBtnNota" onclick="faAcaoNota()">📝 Anotações</button>
    <div class="fa-divider"></div>
    <div class="fa-label">Global</div>
    <div class="fa-row">
        <button class="fa-btn verde" onclick="toggleTodos('trad')">🌐 Todas trad.</button>
        <button class="fa-btn amarelo" onclick="toggleTodos('dica')">💡 Todas dicas</button>
    </div>
</div>

<!-- Botão flutuante de ações — esquerdo -->
<button class="fa-toggle" id="faToggle" onclick="toggleAcoes()" title="Ações do parágrafo">✦</button>

<script>
// ========== VARIÁVEIS GLOBAIS ==========
const video = document.getElementById("video");
const videoSource = document.getElementById("videoSource");
const blocosContainer = document.getElementById("blocosContainer");
const progressoLabel = document.getElementById("progressoLabel");

let autoScroll = true;
let currentBlockIndex = 0;
let lastActiveIndex = -1;
let quizletUrlGlobal = '';

// ========== TOGGLE CONTROLES ==========
window.toggleControls = function() {
    const painel = document.getElementById('floatingControls');
    const btn = document.getElementById('fcToggle');
    const aberto = painel.classList.contains('aberto');
    painel.classList.toggle('aberto', !aberto);
    btn.classList.toggle('aberto', !aberto);
    // Fecha ao clicar fora
    if (!aberto) {
        setTimeout(() => {
            document.addEventListener('click', fecharControlsFora, { once: true });
        }, 10);
    }
};

function fecharControlsFora(e) {
    const painel = document.getElementById('floatingControls');
    const btn = document.getElementById('fcToggle');
    if (!painel.contains(e.target) && !btn.contains(e.target)) {
        painel.classList.remove('aberto');
        btn.classList.remove('aberto');
    }
}

// ========== PAINEL DE AÇÕES ESQUERDO ==========
window.toggleAcoes = function() {
    const painel = document.getElementById('faPainel');
    const btn = document.getElementById('faToggle');
    const aberto = painel.classList.contains('aberto');
    painel.classList.toggle('aberto', !aberto);
    btn.classList.toggle('aberto', !aberto);
    if (!aberto) {
        atualizarPainelAcoes();
        setTimeout(() => {
            document.addEventListener('click', fecharAcoesFora, { once: true });
        }, 10);
    }
};

function fecharAcoesFora(e) {
    const painel = document.getElementById('faPainel');
    const btn = document.getElementById('faToggle');
    if (!painel.contains(e.target) && !btn.contains(e.target)) {
        painel.classList.remove('aberto');
        btn.classList.remove('aberto');
    }
}

function atualizarPainelAcoes() {
    const blocos = document.querySelectorAll('.bloco');
    const blocoAtivo = blocos[currentBlockIndex];
    const infoEl = document.getElementById('faParagrafoInfo');

    if (blocoAtivo) {
        const textoEl = blocoAtivo.querySelector('.italian');
        const texto = textoEl ? textoEl.innerText.replace(/\(\d+:\d+\)\s*/, '').substring(0, 36) + '…' : `Parágrafo ${currentBlockIndex + 1}`;
        infoEl.textContent = texto;

        // Estado tradução
        const tradCol = blocoAtivo.querySelector('.trad-col');
        const btnTrad = document.getElementById('faBtnTrad');
        if (tradCol && btnTrad) {
            const aberta = tradCol.classList.contains('aberto');
            btnTrad.textContent = aberta ? '🌐 Ocultar trad.' : '🌐 Tradução';
        }

        // Estado dica
        const dicaCol = blocoAtivo.querySelector('.dica-col');
        const btnDica = document.getElementById('faBtnDica');
        if (dicaCol && btnDica) {
            const aberta = dicaCol.classList.contains('aberto');
            btnDica.textContent = aberta ? '💡 Ocultar dica' : '💡 Dica';
        }

        // Badge de notas
        atualizarBadgeNotaPainel(currentBlockIndex);
    } else {
        infoEl.textContent = 'Nenhum parágrafo ativo';
    }
}

function atualizarBadgeNotaPainel(index) {
    const btn = document.getElementById('faBtnNota');
    if (!btn) return;
    const count = Storage.count(notaBlocoKey(index));
    const badgeExistente = btn.querySelector('.fa-nota-badge');
    if (count > 0) {
        if (badgeExistente) badgeExistente.textContent = count;
        else {
            const span = document.createElement('span');
            span.className = 'fa-nota-badge';
            span.textContent = count;
            btn.appendChild(span);
        }
        btn.textContent = '📝 Anotações ';
        const span = document.createElement('span');
        span.className = 'fa-nota-badge';
        span.textContent = count;
        btn.appendChild(span);
    } else {
        btn.textContent = '📝 Anotações';
    }
}

// Toggle tradução do bloco ativo
window.faToogleTrad = function() {
    const blocos = document.querySelectorAll('.bloco');
    const blocoAtivo = blocos[currentBlockIndex];
    if (!blocoAtivo) return;
    const col = blocoAtivo.querySelector('.trad-col');
    const btn = blocoAtivo.querySelector('.trad-btn');
    if (!col) return;
    const aberto = col.classList.contains('aberto');
    col.classList.toggle('aberto', !aberto);
    if (btn) btn.classList.toggle('aberto', !aberto);
    atualizarPainelAcoes();
    if (!aberto) blocoAtivo.scrollIntoView({ behavior: 'smooth', block: 'center' });
};

// Toggle dica do bloco ativo
window.faToogleDica = function() {
    const blocos = document.querySelectorAll('.bloco');
    const blocoAtivo = blocos[currentBlockIndex];
    if (!blocoAtivo) return;
    const col = blocoAtivo.querySelector('.dica-col');
    const btn = blocoAtivo.querySelector('.dica-btn');
    if (!col) return;
    const aberto = col.classList.contains('aberto');
    col.classList.toggle('aberto', !aberto);
    if (btn) btn.classList.toggle('aberto', !aberto);
    atualizarPainelAcoes();
    if (!aberto) blocoAtivo.scrollIntoView({ behavior: 'smooth', block: 'center' });
};

// Praticar fala do bloco ativo
window.faAcaoMic = function() {
    const blocos = document.querySelectorAll('.bloco');
    const blocoAtivo = blocos[currentBlockIndex];
    if (!blocoAtivo) { alert('Nenhum parágrafo ativo.'); return; }
    const micBtn = blocoAtivo.querySelector('.mic-btn');
    if (micBtn) {
        document.getElementById('faPainel').classList.remove('aberto');
        document.getElementById('faToggle').classList.remove('aberto');
        blocoAtivo.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(() => iniciarPratica(micBtn), 400);
    }
};

// Exercícios do bloco ativo
window.faAcaoEx = function() {
    const blocos = document.querySelectorAll('.bloco');
    const blocoAtivo = blocos[currentBlockIndex];
    if (!blocoAtivo) { alert('Nenhum parágrafo ativo.'); return; }
    const exBtn = blocoAtivo.querySelector('.ex-btn');
    document.getElementById('faPainel').classList.remove('aberto');
    document.getElementById('faToggle').classList.remove('aberto');
    if (exBtn) exBtn.click();
    else abrirExercicios(null, currentBlockIndex);
};

// Anotações do bloco ativo
window.faAcaoNota = function() {
    document.getElementById('faPainel').classList.remove('aberto');
    document.getElementById('faToggle').classList.remove('aberto');
    abrirNotas(currentBlockIndex);
};

// ========== FUNÇÕES GLOBAIS ==========
window.abrirQuizlet = function() {
    const modal = document.getElementById('quizletModal');
    const iframe = document.getElementById('quizletFrame');
    if (quizletUrlGlobal) { iframe.src = quizletUrlGlobal; }
    else { iframe.src = 'quizlet.html?quizlet=1'; }
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
}
window.fecharQuizlet = function() {
    document.getElementById('quizletModal').style.display = 'none';
    document.body.style.overflow = '';
}
window.voltarHome = function() { window.location.href = 'home.html'; }
window.toggleItem = function(btn) {
    const bloco = btn.closest('.bloco');
    const tBtns = [...bloco.querySelectorAll('.toggle-btn')];
    const cols = [...bloco.querySelectorAll('.colapsavel')];
    const idx = tBtns.indexOf(btn);
    const alvo = cols[idx];
    if (!alvo) return;
    const aberto = alvo.classList.contains('aberto');
    alvo.classList.toggle('aberto', !aberto);
    btn.classList.toggle('aberto', !aberto);
}
window.toggleTodos = function(tipo) {
    const isTrad = tipo === 'trad';
    const colClass = isTrad ? 'trad-col' : 'dica-col';
    const btnClass = isTrad ? 'trad-btn' : 'dica-btn';
    const cols = [...document.querySelectorAll('.' + colClass)];
    const btns = [...document.querySelectorAll('.' + btnClass)];
    const algumFechado = cols.some(c => !c.classList.contains('aberto'));
    cols.forEach(c => c.classList.toggle('aberto', algumFechado));
    btns.forEach(b => b.classList.toggle('aberto', algumFechado));
    // Atualiza estado dos botões globais no painel se existirem
    const btnGlobalTrad = document.getElementById('btnTodasTrad');
    const btnGlobalDica = document.getElementById('btnTodasDica');
    if (isTrad && btnGlobalTrad) btnGlobalTrad.textContent = algumFechado ? '🌐 Ocultar todas' : '🌐 Todas trad.';

async function carregarAula() {
    const urlParams = new URLSearchParams(window.location.search);
    const aulaId = urlParams.get('aula') || '1';
    try {
        const response = await fetch(`dados/aula${aulaId}.json`);
        const data = await response.json();
        document.title = data.titulo;
        document.getElementById('pageTitle').textContent = data.titulo;
        videoSource.src = data.videoUrl;
        video.load();
        quizletUrlGlobal = data.quizletUrl;
        renderizarBlocos(data.blocos);
    } catch (error) {
        console.error('Erro:', error);
        blocosContainer.innerHTML = '<p style="color:red;text-align:center;">Erro ao carregar a aula</p>';
    }

function renderizarBlocos(blocos) {
    blocosContainer.innerHTML = '';
    blocos.forEach((bloco, index) => {
        const blocoDiv = document.createElement('div');
        blocoDiv.className = 'bloco';
        blocoDiv.dataset.start = bloco.start;
        const mins = Math.floor(bloco.start / 60);
        const secs = bloco.start % 60;
        const tempo = `${mins}:${secs.toString().padStart(2,'0')}`;
        blocoDiv.innerHTML = `
            <div class="italian">
                <span class="timestamp" data-time="${tempo}">(${tempo})</span>
                ${bloco.italian}
            </div>
            <button class="toggle-btn trad-btn" onclick="toggleItem(this)">🌐 Tradução <span class="seta">▾</span></button>
            <button class="toggle-btn dica-btn" onclick="toggleItem(this)">💡 Dica <span class="seta">▾</span></button>
            <button class="mic-btn" onclick="iniciarPratica(this)">🎙️ Praticar Fala</button>
            <button class="ex-btn" onclick="abrirExercicios(this, ${index})">✏️ Exercícios</button>
            <button class="nota-btn" id="nota-btn-${index}" onclick="abrirNotas(${index})">📝 Anotações</button>
            <div class="colapsavel trad-col"><div class="traducao">${bloco.translation}</div></div>
            <div class="colapsavel dica-col"><div class="dica">${bloco.tip}</div></div>
            <div class="mic-resultado"></div>
            ${bloco.miniLesson ? `<details><summary>📘 Mini Lição — ${bloco.miniLesson.title}</summary><div class="mini-aula-corpo">${bloco.miniLesson.content}</div></details>` : ''}
        `;
        blocosContainer.appendChild(blocoDiv);
    });
    const ctaDiv = document.createElement('div');
    ctaDiv.className = 'quizlet-cta';
    ctaDiv.innerHTML = `<div class="quizlet-cta-inner"><div class="quizlet-cta-text"><span class="quizlet-cta-icon">🎯</span><div><strong>Pronto para praticar?</strong><p>Vocabulário completo da aula</p></div></div><button class="quizlet-btn" onclick="abrirQuizlet()">Abrir Quizlet →</button></div>`;
    blocosContainer.appendChild(ctaDiv);
    document.querySelectorAll(".timestamp").forEach(el => {
        el.addEventListener("click", () => {
            const t = el.dataset.time.split(":");
            video.currentTime = parseInt(t[0]) * 60 + parseInt(t[1]);
            video.play();
        });
    });
    iniciarDestaque();
    if (typeof atualizarTodosOsBotoesNota === 'function') atualizarTodosOsBotoesNota();
}

function iniciarDestaque() {
    const blocos = document.querySelectorAll(".bloco");
    progressoLabel.textContent = `Parágrafo 1 de ${blocos.length}`;
    video.addEventListener("timeupdate", () => {
        const t = video.currentTime;
        blocos.forEach((bloco, i) => {
            const ini = parseFloat(bloco.dataset.start);
            const fim = blocos[i+1] ? parseFloat(blocos[i+1].dataset.start) : Infinity;
            if (t >= ini && t < fim) {
                currentBlockIndex = i;
                if (lastActiveIndex !== i) {
                    lastActiveIndex = i;
                    blocos.forEach(b => b.classList.remove("ativo"));
                    bloco.classList.add("ativo");
                    progressoLabel.textContent = `Parágrafo ${i+1} de ${blocos.length}`;
                    if (autoScroll) bloco.scrollIntoView({ behavior: "smooth", block: "center" });

                    if (document.getElementById('faPainel').classList.contains('aberto')) {

                    }
                }
            }
        });
    });
}

let recognitionAtiva = null;
window.iniciarPratica = function(btn) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { alert('Seu navegador não suporta reconhecimento de fala.\nTente o Google Chrome.'); return; }
    if (btn.classList.contains('gravando')) { if (recognitionAtiva) recognitionAtiva.stop(); return; }
    if (recognitionAtiva) recognitionAtiva.stop();
    const bloco = btn.closest('.bloco');
    const textoItalianoEl = bloco.querySelector('.italian');
    const textoCompleto = textoItalianoEl.innerText.replace(/\(\d+:\d+\)\s*/,'').trim().toLowerCase();
    const resultado = bloco.querySelector('.mic-resultado');
    const recognition = new SpeechRecognition();
    recognition.lang = 'it-IT';
    recognition.interimResults = false;
    recognition.maxAlternatives = 3;
    recognitionAtiva = recognition;
    btn.classList.add('gravando');
    btn.innerHTML = '⏹️ Parar';
    resultado.className = 'mic-resultado';
    resultado.style.display = 'none';
    recognition.onresult = function(event) {
        const alternativas = [...event.results[0]].map(a => a.transcript.toLowerCase().trim());
        const melhor = alternativas[0];
        const normalizar = t => t.replace(/[.,!?;:""''\u00E0\u00E8\u00E9\u00EC\u00F2\u00F9]/g,'').trim();
        const textoNorm = normalizar(textoCompleto);
        const melhorNorm = normalizar(melhor);
        const palavrasTexto = textoNorm.split(/\s+/);
        const palavrasFala = melhorNorm.split(/\s+/);
        const emComum = palavrasTexto.filter(p => palavrasFala.includes(p)).length;
        const pct = emComum / palavrasTexto.length;
        resultado.style.display = 'block';
        if (pct >= 0.85) {
            resultado.className = 'mic-resultado acerto';
            resultado.innerHTML = `✅ <strong>Ótimo trabalho!</strong> Você disse:<br><em>"${melhor}"</em>`;
        } else if (pct >= 0.5) {
            resultado.className = 'mic-resultado parcial';
            resultado.innerHTML = `🟡 <strong>Quase lá!</strong> Você disse:<br><em>"${melhor}"</em><br><span style="font-size:0.78rem;opacity:0.75">Texto esperado: "${textoCompleto}"</span>`;
        } else {
            resultado.className = 'mic-resultado erro';
            resultado.innerHTML = `❌ <strong>Tente novamente.</strong> Você disse:<br><em>"${melhor}"</em><br><span style="font-size:0.78rem;opacity:0.75">Texto esperado: "${textoCompleto}"</span>`;
        }
    };
    recognition.onerror = function(event) {
        resultado.style.display = 'block';
        resultado.className = 'mic-resultado erro';
        if (event.error === 'no-speech') resultado.innerHTML = '🎙️ Nenhuma fala detectada. Tente novamente.';
        else if (event.error === 'not-allowed') resultado.innerHTML = '🔒 Permissão do microfone negada.';
        else resultado.innerHTML = `⚠️ Erro: ${event.error}`;
    };
    recognition.onend = function() { btn.classList.remove('gravando'); btn.innerHTML = '🎙️ Praticar Fala'; recognitionAtiva = null; };
    recognition.start();
};

const NOTAS_KEY = 'italian_notes';
const Storage = {
    getAll() { try { return JSON.parse(localStorage.getItem(NOTAS_KEY)) || {}; } catch { return {}; } },
    getBloco(key) { return this.getAll()[key] || []; },
    add(key, nota) { const all = this.getAll(); if (!all[key]) all[key] = []; all[key].unshift(nota); localStorage.setItem(NOTAS_KEY, JSON.stringify(all)); },
    remove(key, notaId) { const all = this.getAll(); if (!all[key]) return; all[key] = all[key].filter(n => n.id !== notaId); localStorage.setItem(NOTAS_KEY, JSON.stringify(all)); },
    count(key) { return (this.getAll()[key] || []).length; }
};
let notaBlocoAtual = null, notaTabAtual = 'texto';
function notaBlocoKey(index) { const aulaId = new URLSearchParams(window.location.search).get('aula') || '1'; return 'aula' + aulaId + '_bloco' + index; }

window.salvarNota = function() {
    if (notaBlocoAtual === null) return;
    const key = notaBlocoKey(notaBlocoAtual);
    let nota = null;
    if (notaTabAtual === 'texto') {
        let texto = document.getElementById('nota-input-texto').value.trim();
        if (!texto) { alert('Digite algum texto.'); return; }
        nota = { id: Date.now(), tipo: 'texto', conteudo: texto, data: dataFormatada() };
    } else if (notaTabAtual === 'link') {
        let url = document.getElementById('nota-input-link-url').value.trim();
        let label = document.getElementById('nota-input-link-label').value.trim() || url;
        if (!url) { alert('Digite uma URL.'); return; }
        if (!url.startsWith('http')) url = 'https://' + url;
        nota = { id: Date.now(), tipo: 'link', url: url, label: label, data: dataFormatada() };
    } else if (notaTabAtual === 'video') {
        let ytUrl = document.getElementById('nota-input-yt').value.trim();
        if (!ytUrl) { alert('Digite um link do YouTube.'); return; }
        let videoId = extrairYouTubeId(ytUrl);
        if (!videoId) { alert('Link do YouTube inválido!'); return; }
        nota = { id: Date.now(), tipo: 'video', videoId: videoId, url: ytUrl, data: dataFormatada() };
    }
    if (!nota) return;
    Storage.add(key, nota);
    limparFormNota();
    renderizarNotas(key);
    atualizarBotaoNota(notaBlocoAtual);
    alert('✅ Anotação salva!');
};
window.apagarNota = function(notaId) {
    if (notaBlocoAtual === null) return;
    Storage.remove(notaBlocoKey(notaBlocoAtual), notaId);
    renderizarNotas(notaBlocoKey(notaBlocoAtual));
    atualizarBotaoNota(notaBlocoAtual);
};
function renderizarNotas(key) {
    const lista = document.getElementById('notaLista');
    const notas = Storage.getBloco(key);
    if (notas.length === 0) { lista.innerHTML = '<div class="nota-vazia"><span>📝</span>Nenhuma anotação ainda.</div>'; return; }
    lista.innerHTML = notas.map(n => {
        let corpo = '';
        if (n.tipo === 'texto') corpo = escHtml(n.conteudo).replace(/\n/g, '<br>');
        else if (n.tipo === 'link') corpo = '<a href="' + escHtml(n.url) + '" target="_blank">' + escHtml(n.label) + '</a>';
        else if (n.tipo === 'video') corpo = '<div class="yt-embed"><iframe src="https://www.youtube.com/embed/' + escHtml(n.videoId) + '" allowfullscreen loading="lazy"></iframe></div>';
        const badgeMap = { texto: 'tipo-texto', link: 'tipo-link', video: 'tipo-video' };
        const labelMap = { texto: '📝 Texto', link: '🔗 Link', video: '▶️ Vídeo' };
        return `<div class="nota-item"><div class="nota-item-header"><span class="nota-item-tipo ${badgeMap[n.tipo]}">${labelMap[n.tipo]}</span><span class="nota-item-data">${escHtml(n.data)}</span></div><div class="nota-item-conteudo">${corpo}</div><button class="nota-item-apagar" onclick="apagarNota(${n.id})">🗑</button></div>`;
    }).join('');
}
function atualizarBotaoNota(index) {
    let btn = document.getElementById('nota-btn-' + index);
    if (!btn) return;
    let count = Storage.count(notaBlocoKey(index));
    btn.classList.toggle('tem-nota', count > 0);
    let badge = btn.querySelector('.nota-badge');
    if (count > 0) { if (badge) badge.textContent = count; else { let sp = document.createElement('span'); sp.className = 'nota-badge'; sp.textContent = count; btn.appendChild(sp); } }
    else if (badge) badge.remove();
}
window.atualizarTodosOsBotoesNota = function() { document.querySelectorAll('.bloco').forEach((_, i) => atualizarBotaoNota(i)); };
function limparFormNota() { ['nota-input-texto','nota-input-link-url','nota-input-link-label','nota-input-yt'].forEach(id => { let el = document.getElementById(id); if (el) el.value = ''; }); }
function extrairYouTubeId(url) {
    if (!url) return null;
    url = url.trim();
    let patterns = [/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/, /youtube\.com\/watch\?.*[&?]v=([a-zA-Z0-9_-]{11})/, /^([a-zA-Z0-9_-]{11})$/];
    for (let p of patterns) { let m = url.match(p); if (m && m[1]) return m[1]; }
    return null;
}
function dataFormatada() { return new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
function escHtml(str) { return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ========== EXERCÍCIOS ==========
let exDados = [], exFila = [], exAtual = 0, exAcertos = 0, exRespondido = false, exOrdenarSelecionadas = [], exPronunciaRecognition = null;

window.abrirExercicios = async function(btn, blocoIndex) {
    const aulaId = new URLSearchParams(window.location.search).get('aula') || '1';
    try {
       const res = await fetch(`dados/exercicios_aula${aulaId}.json`);
        const data = await res.json();
        const paragrafo = data.paragrafos[blocoIndex];
        if (!paragrafo || !paragrafo.exercises || paragrafo.exercises.length === 0) { alert('Nenhum exercício disponível para este parágrafo.'); return; }
        exDados = paragrafo.exercises;
        iniciarSessaoExercicios();
    } catch(e) { alert('Erro ao carregar exercícios.'); console.error(e); }
    document.getElementById('exModal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
};
window.fecharExercicios = function() { document.getElementById('exModal').style.display = 'none'; document.body.style.overflow = ''; };
function iniciarSessaoExercicios() { exFila = embaralhar([...exDados]).slice(0, 5); exAtual = 0; exAcertos = 0; renderizarExercicio(); }
function embaralhar(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
function atualizarProgresso() { const total = exFila.length; document.getElementById('exProgresso').textContent = `Questão ${exAtual + 1} de ${total}`; document.getElementById('exProgressoFill').style.width = `${(exAtual / total) * 100}%`; }

function renderizarExercicio() {
    if (exAtual >= exFila.length) { mostrarPlacar(); return; }
    exRespondido = false;
    exOrdenarSelecionadas = [];
    if (exPronunciaRecognition) { exPronunciaRecognition.stop(); exPronunciaRecognition = null; }
    atualizarProgresso();
    const ex = exFila[exAtual];
    const corpo = document.getElementById('exCorpo');
    const badgeClasse = { 'multipla': 'badge-multipla', 'lacuna': 'badge-lacuna', 'ordenar': 'badge-ordenar', 'traduzir': 'badge-traduzir', 'pronuncia': 'badge-pronuncia' }[ex.tipo] || 'badge-multipla';
    const badgeLabel = { 'multipla': '🔵 Múltipla escolha', 'lacuna': '🟣 Completar lacuna', 'ordenar': '🟡 Ordenar palavras', 'traduzir': '🟢 Tradução', 'pronuncia': '🎤 Pronúncia' }[ex.tipo] || ex.tipo;
    let htmlInterativo = '';
    if (ex.tipo === 'multipla') {
        const opcoes = embaralhar([...ex.opcoes]);
        htmlInterativo = `<div class="ex-opcoes">${opcoes.map(op => `<button class="ex-opcao" onclick="responderMultipla(this, '${escapar(op)}', '${escapar(ex.resposta)}')">${op}</button>`).join('')}</div>`;
    } else if (ex.tipo === 'lacuna') {
        const partes = ex.pergunta.split('___');
        htmlInterativo = `<div class="ex-lacuna-wrap"><span>${partes[0]}</span><input class="ex-lacuna-input" id="exLacunaInput" type="text" placeholder="..." autocomplete="off" /><span>${partes[1] || ''}</span></div>`;
    } else if (ex.tipo === 'ordenar') {
        const palavras = embaralhar([...ex.palavras]);
        htmlInterativo = `<div class="ex-area-label">Sua resposta</div><div class="ex-palavras-area" id="exOrdenarArea"></div><div class="ex-area-label" style="margin-top:10px">Palavras disponíveis</div><div class="ex-palavra-banco" id="exPalavraBanco">${palavras.map((p, i) => `<button class="ex-palavra" data-idx="${i}" data-palavra="${escapar(p)}" onclick="selecionarPalavra(this)">${p}</button>`).join('')}</div>`;

    }

    corpo.innerHTML = `<span class="ex-tipo-badge ${badgeClasse}">${badgeLabel}</span>${perguntaHTML}${htmlInterativo}<div class="ex-feedback" id="exFeedback"></div><div class="ex-acoes"><button class="ex-confirmar" id="exConfirmar" onclick="confirmarResposta()">Confirmar</button><button class="ex-proximo" id="exProximo" onclick="proximoExercicio()">Próximo →</button></div>`;
    if (ex.tipo === 'lacuna') { setTimeout(() => document.getElementById('exLacunaInput')?.focus(), 100); document.getElementById('exLacunaInput').addEventListener('keydown', e => { if (e.key === 'Enter' && !exRespondido) confirmarResposta(); }); }

    if (ex.tipo === 'pronuncia') { setTimeout(() => { const confirmBtn = document.getElementById('exConfirmar'); if (confirmBtn) confirmBtn.style.display = 'none'; }, 100); }
}

    resultado.style.display = 'none'; resultado.className = 'mic-resultado';
    recognition.onresult = function(event) {
        const falado = event.results[0][0].transcript.toLowerCase().trim();
        const normalizar = t => t.replace(/[.,!?;:""''\u00E0\u00E8\u00E9\u00EC\u00F2\u00F9]/g,'').trim().toLowerCase();
        const esperadoNorm = normalizar(textoEsperado);
        const faladoNorm = normalizar(falado);
        const palavrasEsperadas = esperadoNorm.split(/\s+/);
        const palavrasFaladas = faladoNorm.split(/\s+/);
        const emComum = palavrasEsperadas.filter(p => palavrasFaladas.includes(p)).length;
        const pct = emComum / palavrasEsperadas.length;
        resultado.style.display = 'block';
        if (pct >= 0.8) {
            resultado.className = 'mic-resultado acerto';
            resultado.innerHTML = `✅ Ótimo! Você disse: "${falado}"<br>🎉 Pronúncia correta!`;
            if (!exRespondido) { exAcertos++; exRespondido = true; const confirmBtn = document.getElementById('exConfirmar'); if (confirmBtn) confirmBtn.style.display = 'none'; document.getElementById('exProximo').style.display = 'block'; }
        } else if (pct >= 0.5) {
            resultado.className = 'mic-resultado parcial';
            resultado.innerHTML = `🟡 Quase lá! Você disse: "${falado}"<br>Esperado: "${textoEsperado}"<br>Tente novamente!`;
        } else {
            resultado.className = 'mic-resultado erro';
            resultado.innerHTML = `❌ Tente novamente. Você disse: "${falado}"<br>Esperado: "${textoEsperado}"`;
        }
    };
    recognition.onerror = function() { resultado.style.display = 'block'; resultado.className = 'mic-resultado erro'; resultado.innerHTML = '❌ Erro no microfone. Tente novamente.'; };
    recognition.onend = function() { btn.classList.remove('gravando'); btn.innerHTML = '🎙️ Gravar minha pronúncia'; exPronunciaRecognition = null; };
    recognition.start();
};

window.selecionarPalavra = function(btn) {
    if (exRespondido) return;
    const palavra = btn.dataset.palavra;
    exOrdenarSelecionadas.push(palavra);
    btn.classList.add('usada');
    const area = document.getElementById('exOrdenarArea');
    const chip = document.createElement('button');
    chip.className = 'ex-palavra selecionada'; chip.textContent = palavra;
    chip.onclick = function() {
        if (exRespondido) return;
        const idx = exOrdenarSelecionadas.lastIndexOf(palavra);
        if (idx !== -1) exOrdenarSelecionadas.splice(idx, 1);
        document.querySelector(`.ex-palavra-banco .ex-palavra[data-idx="${btn.dataset.idx}"]`)?.classList.remove('usada');
        chip.remove();
    };
    area.appendChild(chip);
};

window.confirmarResposta = function() {
    if (exRespondido) return;
    const ex = exFila[exAtual];
    let certa = false, feedbackExtra = '';
    if (ex.tipo === 'multipla') return;
    if (ex.tipo === 'lacuna') {
        const input = document.getElementById('exLacunaInput');
        const resposta = input.value.trim().toLowerCase();
        const esperada = ex.resposta.toLowerCase();
        certa = resposta === esperada || (ex.alternativas || []).map(a => a.toLowerCase()).includes(resposta);
        input.classList.add(certa ? 'certa' : 'errada');
        if (!certa) feedbackExtra = `<br>Resposta correta: <strong>${ex.resposta}</strong>`;
        if (certa) exAcertos++;
        exRespondido = true;
    } else if (ex.tipo === 'ordenar') {
        const frase = exOrdenarSelecionadas.join(' ').toLowerCase().trim();
        certa = frase === ex.resposta.toLowerCase().trim();
        if (!certa) feedbackExtra = `<br>Resposta correta: <strong>${ex.resposta}</strong>`;
        if (certa) exAcertos++;
        exRespondido = true;
        document.querySelectorAll('#exOrdenarArea .ex-palavra').forEach(p => { p.style.borderColor = certa ? '#5cb85c' : '#e05c5c'; p.style.background = certa ? '#e8f5ef' : '#fff0f0'; });
    } else if (ex.tipo === 'traduzir') {
        const input = document.getElementById('exTraduzirInput');
        const resposta = input.value.trim().toLowerCase();
        const palavrasChave = ex.palavrasChave || ex.resposta.toLowerCase().split(/\s+/).filter(p => p.length > 3);
        const acertos = palavrasChave.filter(p => resposta.includes(p)).length;
        certa = acertos >= Math.ceil(palavrasChave.length * 0.6);
        input.style.borderColor = certa ? '#5cb85c' : '#e05c5c';
        feedbackExtra = `<br>Uma tradução válida: <em>${ex.resposta}</em>`;
        if (certa) exAcertos++;
        exRespondido = true;
    } else if (ex.tipo === 'pronuncia') {
        if (!exRespondido) { feedbackExtra = `<br>⚠️ Grave sua pronúncia primeiro!`; mostrarFeedback(false, ex.explicacao, feedbackExtra); return; }
        mostrarFeedback(true, ex.explicacao, '');
        document.getElementById('exConfirmar').style.display = 'none';
        document.getElementById('exProximo').style.display = 'block';
        return;
    }
    mostrarFeedback(certa, ex.explicacao, feedbackExtra);
    if (exRespondido) { document.getElementById('exConfirmar').style.display = 'none'; document.getElementById('exProximo').style.display = 'block'; }
};

window.responderMultipla = function(btn, opcao, resposta) {
    if (exRespondido) return;
    exRespondido = true;
    const certa = opcao === resposta;
    if (certa) exAcertos++;
    document.querySelectorAll('.ex-opcao').forEach(b => { b.disabled = true; if (b.textContent.trim() === resposta) b.classList.add('certa'); });
    btn.classList.add(certa ? 'certa' : 'errada');
    const ex = exFila[exAtual];
    mostrarFeedback(certa, ex.explicacao, certa ? '' : `<br>Resposta correta: <strong>${resposta}</strong>`);
    document.getElementById('exConfirmar').style.display = 'none';
    document.getElementById('exProximo').style.display = 'block';
};

function mostrarFeedback(certa, explicacao, extra) {
    const fb = document.getElementById('exFeedback');
    fb.className = 'ex-feedback ' + (certa ? 'certa' : 'errada');
    fb.innerHTML = (certa ? '✅ Correto!' : '❌ Incorreto.') + (extra || '') + (explicacao ? `<br><span style="opacity:0.8;font-size:0.8rem">${explicacao}</span>` : '');
}

window.proximoExercicio = function() { exAtual++; renderizarExercicio(); };
function mostrarPlacar() {
    const total = exFila.length, pct = Math.round((exAcertos / total) * 100);
    const emoji = pct >= 80 ? '🏆' : pct >= 50 ? '👍' : '💪';
    const msg = pct >= 80 ? 'Excelente trabalho!' : pct >= 50 ? 'Bom progresso!' : 'Continue praticando!';
    document.getElementById('exProgresso').textContent = 'Resultado final';
    document.getElementById('exProgressoFill').style.width = '100%';
    document.getElementById('exCorpo').innerHTML = `<div class="ex-placar"><div class="ex-placar-emoji">${emoji}</div><div class="ex-placar-titulo">${msg}</div><div class="ex-placar-score">${exAcertos}/${total} <span style="font-size:1rem;color:#999">(${pct}%)</span></div><div class="ex-placar-sub">Quer tentar novamente?</div><button class="ex-reiniciar" onclick="iniciarSessaoExercicios()">🔄 Praticar novamente</button></div>`;
}
function escapar(str) { return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

carregarAula();
</script>
