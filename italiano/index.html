<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Aula</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ========== TODOS OS ESTILOS ========== */
:root{
    --verde:#1a6b4a;
    --verde-claro:#e8f5ef;
    --amarelo:#fff3a3;
    --cinza-bg:#f7f6f2;
    --texto:#1c1c1c;
}
*{ box-sizing:border-box; margin:0; padding:0; }
body{ font-family:'DM Sans',sans-serif; background:var(--cinza-bg); color:var(--texto); }

.container{
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}

.video-area{
    width:100%;
    background:#0f1f17;
    padding:16px 24px;
    flex-shrink:0;
    height:33vh;
    min-height:260px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:6px;
    border-bottom:3px solid var(--verde);
    transition: all 0.3s ease;
}
.video-area.oculto { display: none; }

video{ 
    width:100%; 
    height:auto;
    max-height:calc(33vh - 40px);
    border-radius:14px; 
    background:black; 
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
    object-fit:contain;
}
.progresso-label{ 
    color:#7fb99a; 
    font-size:0.7rem; 
    text-align:right; 
    margin-top:-2px;
}

.texto-area{
    flex:1;
    background:white;
    overflow-y:auto;
    padding:16px 24px 100px;
    font-size:17px;
    line-height:1.85;
    scroll-behavior:smooth;
    transition: all 0.3s ease;
}
.texto-area.expandido { flex: 1; height: 100vh; }
.texto-area::-webkit-scrollbar{ width:5px; }
.texto-area::-webkit-scrollbar-track{ background:#f0f0f0; }
.texto-area::-webkit-scrollbar-thumb{ background:#b5d4c5; border-radius:4px; }

.bloco{ margin-bottom:20px; padding:14px 16px; border-radius:14px; transition:all 0.35s ease; border:1.5px solid #ebebeb; background:white; }
.bloco.ativo{ background:var(--amarelo); border-color:#e0c93a; box-shadow:0 4px 20px rgba(224,201,58,0.25); transform:scale(1.01); }

.italian{ margin-bottom:6px; font-family:'Lora',serif; font-size:0.98rem; color:#1c1c1c; }

/* ========== TOGGLE BUTTONS ========== */
.toggle-btn{ display:none; }

.colapsavel{ overflow:hidden; max-height:0; opacity:0; transition:max-height 0.4s ease, opacity 0.3s ease; }
.colapsavel.aberto{ max-height:600px; opacity:1; margin-top:8px; }

.traducao{
    color:#555; font-style:italic; background:#f4f4f0;
    padding:8px 10px; border-radius:10px;
    font-size:0.88rem; border-left:3px solid #b5d4c5;
}
.dica{
    background:#fffbea; border:1px solid #f0e060;
    border-radius:10px; padding:8px 10px;
    font-size:0.82rem; color:#4a3f00; line-height:1.55;
}

.mini-col .mini-aula-corpo{
    background:#f5f8ff;
    border:1px solid #c8d8f0;
    border-radius:10px;
    padding:10px 12px;
    font-size:0.85rem;
    line-height:1.65;
    color:#2a2a2a;
}
.mini-col .mini-aula-corpo strong{ color:#1a56a0; }

details{ border-radius:10px; margin-top:8px; overflow:hidden; border:1px solid #e2ede8; }
summary{
    cursor:pointer; font-weight:700; font-size:0.82rem;
    padding:8px 12px; background:#eaf4ef; color:var(--verde);
    user-select:none; list-style:none; display:flex;
    align-items:center; gap:6px; transition:background 0.2s;
}
summary:hover{ background:#d6ede3; }
summary::after{ content:'▾'; margin-left:auto; font-size:0.9rem; transition:transform 0.3s; }
details[open] summary::after{ transform:rotate(180deg); }
.mini-aula-corpo{ padding:10px 12px; background:#f9fdf9; font-size:0.85rem; line-height:1.65; color:#2a2a2a; }
.mini-aula-corpo strong{ color:var(--verde); }

.timestamp{
    color:var(--verde); cursor:pointer; font-weight:700;
    font-family:'DM Sans',sans-serif; font-size:0.75rem;
    background:#e8f5ef; padding:2px 6px; border-radius:6px;
    margin-right:6px; transition:background 0.2s;
}
.timestamp:hover{ background:var(--verde); color:white; }

/* ========== FLOATING CONTROLS ========== */
.fc-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 10000;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(15,31,23,0.95);
    border: 1.5px solid #2a4a35;
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    transition: transform 0.25s ease, background 0.2s;
    outline: none;
}
.fc-toggle:hover {
    background: #1a3d2b;
    transform: scale(1.08);
}
.fc-toggle.aberto {
    transform: rotate(45deg) scale(1.05);
    background: #1a6b4a;
}

.floating-controls {
    position: fixed;
    bottom: 78px;
    right: 20px;
    z-index: 9999;
    background: rgba(15,31,23,0.97);
    padding: 10px 12px;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: stretch;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    border: 1px solid #2a4a35;
    width: 180px;
    opacity: 0;
    pointer-events: none;
    transform: translateY(12px) scale(0.96);
    transform-origin: bottom right;
    transition: opacity 0.22s ease, transform 0.22s cubic-bezier(.4,0,.2,1);
}
.floating-controls.aberto {
    opacity: 1;
    pointer-events: all;
    transform: translateY(0) scale(1);
}

.fc-row {
    display: flex;
    gap: 4px;
    align-items: center;
}

.floating-controls button,
.floating-controls select {
    border: none;
    padding: 6px 8px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 700;
    background: #2a4a35;
    color: white;
    transition: background 0.2s;
    font-family: 'DM Sans', sans-serif;
    flex: 1;
    text-align: center;
    white-space: nowrap;
}
.floating-controls button:hover { background: var(--verde); }
.floating-controls select {
    background: #2a4a35;
    color: white;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    width: 100%;
    flex: unset;
}

.fc-label {
    font-size: 0.58rem;
    color: #5a9a7a;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 700;
    margin-bottom: 1px;
    padding: 0 2px;
}
.fc-divider {
    height: 1px;
    background: rgba(255,255,255,0.07);
    margin: 2px 0;
}

.btn-home { background: #1a3a6a !important; }
.btn-home:hover { background: #1f6feb !important; }

@media(max-width:900px){
    .video-area{ min-height:220px; padding:12px 16px; }
    video{ max-height:calc(33vh - 30px); }
    .texto-area{ padding:12px 16px 80px; }
    .bloco{ padding:12px 14px; margin-bottom:16px; }
    .floating-controls { right: 16px; bottom: 74px; width: 170px; }
    .fc-toggle { right: 16px; bottom: 16px; }
}

.quizlet-cta{
    margin-top: 24px;
    margin-bottom: 12px;
    border-radius: 14px;
    background: linear-gradient(135deg, #0f1f17 0%, #1a3d2b 100%);
    border: 1.5px solid #2a5c3f;
    overflow: hidden;
}
.quizlet-cta-inner{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 12px 16px;
    flex-wrap: wrap;
}
.quizlet-cta-text{
    display: flex;
    align-items: center;
    gap: 8px;
    color: #e8f5ef;
}
.quizlet-cta-icon{ font-size: 1.4rem; flex-shrink: 0; }
.quizlet-cta-text strong{ display: block; font-size: 0.85rem; color: #e8f5ef; margin-bottom: 2px; }
.quizlet-cta-text p{ font-size: 0.65rem; color: #7fb99a; margin: 0; }
.quizlet-btn{
    background: #3fb950;
    color: #0d1117;
    border: none;
    padding: 6px 14px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
}
.quizlet-btn:hover{
    background: #52d363;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(63,185,80,0.35);
}

/* Modais */
.qmodal{
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s ease;
}
@keyframes fadeIn{
    from{ opacity:0; }
    to{ opacity:1; }
}
.qmodal-overlay{
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
}
.qmodal-box{
    position: relative;
    width: 94vw;
    max-width: 860px;
    height: 90vh;
    background: #0d1117;
    border-radius: 20px;
    overflow: hidden;
    border: 1.5px solid #30363d;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    animation: slideUp 0.3s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp{
    from{ transform: translateY(40px); opacity:0; }
    to{ transform: translateY(0); opacity:1; }
}
.qmodal-close{
    position: absolute;
    top: 12px;
    right: 14px;
    z-index: 10;
    background: rgba(255,255,255,0.08);
    border: none;
    color: #e6edf3;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
}
.qmodal-close:hover{ background: rgba(248,81,73,0.3); }
.qmodal-frame{
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}

.mic-btn { display: none; }
.nota-btn { display: none; }
.ex-btn { display: none; }

/* ========== MODAL ANOTAÇÕES COM EDIT ========== */
.nota-modal {
    position: fixed;
    inset: 0;
    z-index: 99998;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn 0.2s ease;
}
.nota-modal-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(3px);
}
.nota-modal-box {
    position: relative;
    width: 100%;
    max-width: 680px;
    max-height: 90vh;
    background: #fffdf8;
    border-radius: 24px 24px 0 0;
    overflow-y: auto;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.2);
    animation: slideUpEx 0.32s cubic-bezier(.4,0,.2,1);
    display: flex;
    flex-direction: column;
}
.nota-modal-header {
    padding: 18px 20px 12px;
    border-bottom: 1px solid #f0e8d8;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    background: #fffdf8;
    z-index: 2;
}
.nota-modal-titulo { font-size: 0.78rem; font-weight: 700; color: #b05000; text-transform: uppercase; letter-spacing: 0.05em; }
.nota-modal-ref { font-size: 0.72rem; color: #999; font-style: italic; margin-top: 2px; max-width: 80%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nota-modal-close { background: #f0e8d8; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0; }
.nota-modal-close:hover { background: #e0d0b8; }

.nota-lista { flex: 1; padding: 14px 20px; display: flex; flex-direction: column; gap: 10px; }
.nota-item { background: white; border: 1px solid #f0e0c8; border-radius: 14px; padding: 12px 14px; position: relative; }
.nota-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.nota-item-data { font-size: 0.65rem; color: #bbb; font-style: italic; }
.nota-item-tipo { font-size: 0.62rem; font-weight: 700; padding: 2px 7px; border-radius: 20px; text-transform: uppercase; }
.tipo-texto  { background: #fff5e8; color: #b05000; }
.tipo-link   { background: #e8f0fe; color: #1a56a0; }
.tipo-video  { background: #ffeaea; color: #c0392b; }
.nota-item-conteudo { font-size: 0.88rem; line-height: 1.6; color: #333; word-break: break-word; }
.nota-item-conteudo .yt-embed { margin-top: 8px; border-radius: 10px; overflow: hidden; aspect-ratio: 16/9; background: #000; }
.nota-item-conteudo .yt-embed iframe { width: 100%; height: 100%; border: none; display: block; }
.nota-item-acoes {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    justify-content: flex-end;
}
.nota-editar-btn, .nota-excluir-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 0.75rem;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
}
.nota-editar-btn {
    color: #1a56a0;
    background: #e8f0fe;
}
.nota-editar-btn:hover {
    background: #1a56a0;
    color: white;
}
.nota-excluir-btn {
    color: #c0392b;
    background: #ffeaea;
}
.nota-excluir-btn:hover {
    background: #c0392b;
    color: white;
}
.nota-vazia { text-align: center; color: #ccc; font-size: 0.85rem; padding: 30px 0; }
.nota-vazia span { font-size: 2rem; display: block; margin-bottom: 8px; }

/* Formulário de edição */
.nota-form-editar {
    padding: 14px 20px 20px;
    border-top: 1px solid #f0e8d8;
    background: #fffdf8;
    flex-shrink: 0;
    display: none;
}
.nota-form-editar.ativo {
    display: block;
}
.nota-form-editar .nota-form-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
}
.nota-form-editar .nota-tab {
    flex: 1;
    padding: 6px 8px;
    border-radius: 10px;
    border: 1.5px solid #e0d0b8;
    background: transparent;
    font-size: 0.72rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    color: #999;
    transition: all 0.18s;
}
.nota-form-editar .nota-tab.ativo {
    background: #fff5e8;
    border-color: #f0a050;
    color: #b05000;
}
.nota-form-editar .nota-form-campo {
    display: none;
    flex-direction: column;
    gap: 8px;
}
.nota-form-editar .nota-form-campo.ativo {
    display: flex;
}
.nota-form-editar .nota-input,
.nota-form-editar .nota-textarea {
    width: 100%;
    border: 1.5px solid #e0d0b8;
    border-radius: 10px;
    padding: 9px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    outline: none;
    background: white;
    color: #1c1c1c;
    transition: border-color 0.2s;
    resize: none;
}
.nota-form-editar .nota-textarea {
    min-height: 80px;
    line-height: 1.5;
}
.nota-form-actions {
    display: flex;
    gap: 10px;
    margin-top: 12px;
}
.nota-salvar-edicao {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    border: none;
    background: #e07010;
    color: white;
    font-weight: 700;
    font-size: 0.88rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.2s;
}
.nota-salvar-edicao:hover { background: #c06000; }
.nota-cancelar-edicao {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    border: 1.5px solid #e0d0b8;
    background: transparent;
    color: #999;
    font-weight: 700;
    font-size: 0.88rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
}
.nota-cancelar-edicao:hover {
    background: #f0e8d8;
    color: #666;
}

/* Formulário de nova anotação */
.nota-form {
    padding: 14px 20px 20px;
    border-top: 1px solid #f0e8d8;
    background: #fffdf8;
    flex-shrink: 0;
    position: sticky;
    bottom: 0;
}
.nota-form .nota-form-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
}
.nota-form .nota-tab {
    flex: 1;
    padding: 6px 8px;
    border-radius: 10px;
    border: 1.5px solid #e0d0b8;
    background: transparent;
    font-size: 0.72rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    color: #999;
    transition: all 0.18s;
}
.nota-form .nota-tab.ativo {
    background: #fff5e8;
    border-color: #f0a050;
    color: #b05000;
}
.nota-form .nota-form-campo {
    display: none;
    flex-direction: column;
    gap: 8px;
}
.nota-form .nota-form-campo.ativo {
    display: flex;
}
.nota-form .nota-input,
.nota-form .nota-textarea {
    width: 100%;
    border: 1.5px solid #e0d0b8;
    border-radius: 10px;
    padding: 9px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    outline: none;
    background: white;
    color: #1c1c1c;
    transition: border-color 0.2s;
    resize: none;
}
.nota-form .nota-textarea {
    min-height: 80px;
    line-height: 1.5;
}
.nota-form .nota-salvar {
    width: 100%;
    padding: 10px;
    border-radius: 12px;
    border: none;
    background: #e07010;
    color: white;
    font-weight: 700;
    font-size: 0.88rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.2s;
    margin-top: 4px;
}
.nota-salvar:hover { background: #c06000; }

/* MODAL EXERCÍCIOS */
.exmodal {
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn 0.2s ease;
}
.exmodal-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(3px);
}
.exmodal-box {
    position: relative;
    width: 100%;
    max-width: 680px;
    max-height: 88vh;
    background: #fff;
    border-radius: 24px 24px 0 0;
    overflow-y: auto;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.25);
    animation: slideUpEx 0.32s cubic-bezier(.4,0,.2,1);
    padding: 24px 20px 32px;
}
@keyframes slideUpEx {
    from { transform: translateY(60px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
}
.exmodal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.exmodal-titulo { font-size: 0.78rem; font-weight: 700; color: #1a56a0; text-transform: uppercase; letter-spacing: 0.05em; }
.exmodal-close { background: #f0f0f0; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
.exmodal-close:hover { background: #e0e0e0; }

.ex-progresso { font-size: 0.7rem; color: #999; margin-bottom: 16px; }
.ex-progresso-bar { height: 4px; background: #eee; border-radius: 4px; margin-bottom: 18px; overflow: hidden; }
.ex-progresso-fill { height: 100%; background: var(--verde); border-radius: 4px; transition: width 0.4s ease; }

.ex-tipo-badge {
    display: inline-block;
    font-size: 0.62rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
}
.badge-multipla  { background: #e8f0fe; color: #1a56a0; }
.badge-lacuna    { background: #fce8ff; color: #7a1fa0; }
.badge-ordenar   { background: #fff3cd; color: #7a5500; }
.badge-traduzir  { background: #e8f5ef; color: #1a6b4a; }
.badge-pronuncia { background: #f0e6ff; color: #6a1a9e; }

.ex-pergunta { font-family: 'Lora', serif; font-size: 1.05rem; line-height: 1.6; color: #1c1c1c; margin-bottom: 18px; }
.ex-pergunta em { color: var(--verde); font-style: normal; font-weight: 600; }

.ex-pronuncia-area {
    text-align: center;
    padding: 20px;
    background: #f9f6ff;
    border-radius: 16px;
    margin: 10px 0;
}
.ex-palavra-destaque {
    font-family: 'Lora', serif;
    font-size: 1.8rem;
    font-weight: 600;
    color: #6a1a9e;
    margin-bottom: 20px;
    padding: 15px;
    background: white;
    border-radius: 12px;

    padding: 5px 10px;

    font-size: 0.9rem;

}

.ex-palavra.selecionada { background: #e8f0fe; border-color: #1a56a0; }
.ex-area-label { font-size: 0.7rem; color: #999; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }

.ex-textarea {

.ex-feedback {

.ex-acoes { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }

.ex-proximo {

.ex-placar { text-align: center; padding: 20px 0; }

/* PRÁTICA DE PRONÚNCIA MODAL */

.pratica-label {

.pratica-ouvir-btn {

}

.pratica-status {

/* ========== PAINEL DE AÇÕES ========== */

<div class="container">
    <div class="video-area">
        <video id="video" controls>
            <source id="videoSource" src="" type="video/mp4">

    <div class="texto-area" id="texto">
        <div id="blocosContainer"></div>
    </div>
</div>

<!-- MODAL ANOTAÇÕES COM EDIT -->
<div id="notaModal" class="nota-modal" style="display:none">
    <div class="nota-modal-overlay" onclick="fecharNotas()"></div>
    <div class="nota-modal-box">
        <div class="nota-modal-header">
            <div>
                <div class="nota-modal-titulo">📝 Anotações</div>
                <div class="nota-modal-ref" id="notaModalRef"></div>
            </div>
            <button class="nota-modal-close" onclick="fecharNotas()">✕</button>
        </div>
        <div class="nota-lista" id="notaLista"></div>
        
        <!-- Formulário de Edição (inicialmente oculto) -->
        <div id="notaFormEditar" class="nota-form-editar">
            <div class="nota-form-tabs">
                <button class="nota-tab" data-tipo="texto" onclick="trocarTabEdicao('texto', this)">📝 Texto</button>
                <button class="nota-tab" data-tipo="link" onclick="trocarTabEdicao('link', this)">🔗 Link</button>
                <button class="nota-tab" data-tipo="video" onclick="trocarTabEdicao('video', this)">▶️ YouTube</button>
            </div>
            <div id="editar-campo-texto" class="nota-form-campo">
                <textarea class="nota-textarea" id="editar-input-texto" placeholder="Edite sua anotação..." rows="3"></textarea>
            </div>
            <div id="editar-campo-link" class="nota-form-campo">
                <input class="nota-input" id="editar-input-link-url" type="url" placeholder="https://..." />
                <input class="nota-input" id="editar-input-link-label" type="text" placeholder="Descrição (opcional)" />
            </div>
            <div id="editar-campo-video" class="nota-form-campo">
                <input class="nota-input" id="editar-input-yt" type="url" placeholder="https://youtube.com/watch?v=..." />
            </div>
            <div class="nota-form-actions">
                <button class="nota-cancelar-edicao" onclick="cancelarEdicao()">Cancelar</button>
                <button class="nota-salvar-edicao" onclick="salvarEdicao()">💾 Salvar alterações</button>
            </div>
        </div>
        
        <!-- Formulário de Nova Anotação -->
        <div class="nota-form">
            <div class="nota-form-tabs">
                <button class="nota-tab ativo" onclick="trocarTabNota('texto', this)">📝 Texto</button>
                <button class="nota-tab" onclick="trocarTabNota('link', this)">🔗 Link</button>
                <button class="nota-tab" onclick="trocarTabNota('video', this)">▶️ YouTube</button>
            </div>
            <div class="nota-form-campo ativo" id="nota-campo-texto">
                <textarea class="nota-textarea" id="nota-input-texto" placeholder="Escreva sua anotação..." rows="3"></textarea>
            </div>
            <div class="nota-form-campo" id="nota-campo-link">
                <input class="nota-input" id="nota-input-link-url" type="url" placeholder="https://..." />
                <input class="nota-input" id="nota-input-link-label" type="text" placeholder="Descrição (opcional)" />
            </div>
            <div class="nota-form-campo" id="nota-campo-video">
                <input class="nota-input" id="nota-input-yt" type="url" placeholder="https://youtube.com/watch?v=..." />

            <button class="nota-salvar" onclick="salvarNota()">+ Salvar anotação</button>
        </div>
    </div>
</div>

<!-- MODAL EXERCÍCIOS -->
<div id="exModal" class="exmodal" style="display:none">

    <div class="exmodal-box">
        <div class="exmodal-header">

let _notasCache = null;

async function _carregarCache() {
    if (_notasCache !== null) return _notasCache;
    try {
        const slug = (window.IDIOMA_CONFIG && window.IDIOMA_CONFIG.slug) || 'idioma';
        const snap = await getDoc(doc(db, 'notas_idiomas', slug));
        _notasCache = snap.exists() ? (snap.data() || {}) : {};
    } catch (e) {
        console.warn('Firebase offline, usando cache local.', e);
        try { _notasCache = JSON.parse(localStorage.getItem((window.IDIOMA_CONFIG && window.IDIOMA_CONFIG.slug || 'idioma') + '_notes_backup')) || {}; } catch { _notasCache = {}; }
    }
    return _notasCache;
}

async function _persistir(dados) {
    _notasCache = dados;
    try { localStorage.setItem((window.IDIOMA_CONFIG && window.IDIOMA_CONFIG.slug || 'idioma') + '_notes_backup', JSON.stringify(dados)); } catch {}
    try {
        await setDoc(doc(db, 'notas_idiomas', (window.IDIOMA_CONFIG && window.IDIOMA_CONFIG.slug) || 'idioma'), dados);
    } catch (e) { console.error('Erro ao salvar no Firebase:', e); }
}

(function aplicarConfig() {

    const corClaro = cfg.corClaro || (cor + '22');

// ========== TOGGLE CONTROLES ==========
window.toggleControls = function() {
    const painel = document.getElementById('floatingControls');
    const btn = document.getElementById('fcToggle');
    const aberto = painel.classList.contains('aberto');
    painel.classList.toggle('aberto', !aberto);
    btn.classList.toggle('aberto', !aberto);
    if (!aberto) {
        setTimeout(() => { document.addEventListener('click', fecharControlsFora, { once: true }); }, 10);
    }
};

function fecharControlsFora(e) {
    const painel = document.getElementById('floatingControls');
    const btn = document.getElementById('fcToggle');
    if (!painel.contains(e.target) && !btn.contains(e.target)) {
        painel.classList.remove('aberto');
        btn.classList.remove('aberto');
    }
}

// ========== PAINEL DE AÇÕES ==========
window.toggleAcoes = function() {
    const painel = document.getElementById('faPainel');
    const btn = document.getElementById('faToggle');
    const aberto = painel.classList.contains('aberto');
    painel.classList.toggle('aberto', !aberto);
    btn.classList.toggle('aberto', !aberto);
    if (!aberto) {
        atualizarPainelAcoes();
        setTimeout(() => { document.addEventListener('click', fecharAcoesFora, { once: true }); }, 10);
    }
};

function fecharAcoesFora(e) {
    const painel = document.getElementById('faPainel');
    const btn = document.getElementById('faToggle');
    if (!painel.contains(e.target) && !btn.contains(e.target)) {
        painel.classList.remove('aberto');
        btn.classList.remove('aberto');
    }
}

async function atualizarPainelAcoes() {
    const blocos = document.querySelectorAll('.bloco');
    const blocoAtivo = blocos[currentBlockIndex];
    const infoEl = document.getElementById('faParagrafoInfo');
    if (blocoAtivo) {
        const textoEl = blocoAtivo.querySelector('.italian');
        const texto = textoEl ? textoEl.innerText.replace(/\(\d+:\d+\)\s*/, '').substring(0, 36) + '…' : `Parágrafo ${currentBlockIndex + 1}`;
        infoEl.textContent = texto;
        const tradCol = blocoAtivo.querySelector('.trad-col');
        const btnTrad = document.getElementById('faBtnTrad');
        if (tradCol && btnTrad) btnTrad.textContent = tradCol.classList.contains('aberto') ? '🌐 Fechar' : '🌐 Trad.';
        const dicaCol = blocoAtivo.querySelector('.dica-col');
        const btnDica = document.getElementById('faBtnDica');
        if (dicaCol && btnDica) btnDica.textContent = dicaCol.classList.contains('aberto') ? '💡 Fechar' : '💡 Dica';
        const miniCol = blocoAtivo.querySelector('.mini-col');
        const btnMini = document.getElementById('faBtnMini');
        if (btnMini) btnMini.style.display = miniCol ? '' : 'none';
        await atualizarBadgeNotaPainel(currentBlockIndex);
    } else { infoEl.textContent = 'Nenhum parágrafo ativo'; }
}

async function atualizarBadgeNotaPainel(index) {
    const btn = document.getElementById('faBtnNota');
    if (!btn) return;
    const count = await Storage.count(notaBlocoKey(index));
    btn.textContent = '📝 Anotações';
    const badgeExistente = btn.querySelector('.fa-nota-badge');
    if (badgeExistente) badgeExistente.remove();
    if (count > 0) {
        const span = document.createElement('span');
        span.className = 'fa-nota-badge';
        span.textContent = count;
        btn.appendChild(span);
    }
}

window.faToogleTrad = async function() {
    const blocos = document.querySelectorAll('.bloco');
    const blocoAtivo = blocos[currentBlockIndex];
    if (!blocoAtivo) return;
    const col = blocoAtivo.querySelector('.trad-col');
    const btn = blocoAtivo.querySelector('.trad-btn');
    if (!col) return;
    col.classList.toggle('aberto');
    if (btn) btn.classList.toggle('aberto');
    await atualizarPainelAcoes();
    if (col.classList.contains('aberto')) blocoAtivo.scrollIntoView({ behavior: 'smooth', block: 'center' });
};

window.voltarHome = function() { window.location.href = 'home.html'; };
window.toggleItem = function(btn) {
    const bloco = btn.closest('.bloco');
    const tBtns = [...bloco.querySelectorAll('.toggle-btn')];
    const cols = [...bloco.querySelectorAll('.colapsavel')];
    const idx = tBtns.indexOf(btn);
    const alvo = cols[idx];
    if (!alvo) return;
    alvo.classList.toggle('aberto');
    btn.classList.toggle('aberto');
};
window.toggleTodos = function(tipo) {
    const isTrad = tipo === 'trad';
    const colClass = isTrad ? 'trad-col' : 'dica-col';
    const btnClass = isTrad ? 'trad-btn' : 'dica-btn';
    const cols = [...document.querySelectorAll('.' + colClass)];
    const btns = [...document.querySelectorAll('.' + btnClass)];
    const algumFechado = cols.some(c => !c.classList.contains('aberto'));
    cols.forEach(c => c.classList.toggle('aberto', algumFechado));
    btns.forEach(b => b.classList.toggle('aberto', algumFechado));
};
window.toggleAutoScroll = function() {
    autoScroll = !autoScroll;
    document.getElementById("toggleScrollBtn").innerHTML = autoScroll ? "🔒 Auto-scroll" : "🔓 Scroll livre";
};
window.nextParagraph = function() {
    autoScroll = false;
    document.getElementById("toggleScrollBtn").innerHTML = "🔓 Scroll livre";
    const blocos = document.querySelectorAll(".bloco");
    if (currentBlockIndex < blocos.length - 1) {
        currentBlockIndex++;
        blocos[currentBlockIndex].scrollIntoView({ behavior: "smooth", block: "center" });

window.previousParagraph = function() {
    autoScroll = false;
    document.getElementById("toggleScrollBtn").innerHTML = "🔓 Scroll livre";
    if (currentBlockIndex > 0) {
        currentBlockIndex--;
        document.querySelectorAll(".bloco")[currentBlockIndex].scrollIntoView({ behavior: "smooth", block: "center" });
    }
};
window.toggleVideo = function() {
    const videoArea = document.querySelector('.video-area');
    const textoArea = document.querySelector('.texto-area');
    const btn = document.getElementById('btnToggleVideo');
    if (videoArea.classList.contains('oculto')) {
        videoArea.classList.remove('oculto');
        textoArea.classList.remove('expandido');
        btn.textContent = '🎥 Ocultar vídeo';
        localStorage.setItem('videoOculto', 'false');
    } else {
        videoArea.classList.add('oculto');
        textoArea.classList.add('expandido');
        btn.textContent = '🎥 Mostrar vídeo';
        localStorage.setItem('videoOculto', 'true');
        if (video && !video.paused) video.pause();
    }
};
function carregarPreferenciaVideo() {
    if (localStorage.getItem('videoOculto') === 'true') {
        document.querySelector('.video-area')?.classList.add('oculto');
        document.querySelector('.texto-area')?.classList.add('expandido');
        const btn = document.getElementById('btnToggleVideo');
        if (btn) btn.textContent = '🎥 Mostrar vídeo';
    }
}

// ========== CARREGAR AULA ==========
async function carregarAula() {
    const urlParams = new URLSearchParams(window.location.search);
    const aulaId = urlParams.get('aula') || '1';
    try {
        const response = await fetch(`dados/aula${aulaId}.json`);
        const data = await response.json();
        document.title = data.titulo;
        document.getElementById('pageTitle').textContent = data.titulo;
        videoSource.src = data.videoUrl;
        video.load();
        quizletUrlGlobal = data.quizletUrl;
        renderizarBlocos(data.blocos);
    } catch (error) {
        console.error('Erro:', error);
        blocosContainer.innerHTML = '<p style="color:red;text-align:center;">Erro ao carregar a aula</p>';
    }
}

function renderizarBlocos(blocos) {
    blocosContainer.innerHTML = '';
    blocos.forEach((bloco, index) => {
        const blocoDiv = document.createElement('div');
        blocoDiv.className = 'bloco';
        blocoDiv.dataset.start = bloco.start;
        const mins = Math.floor(bloco.start / 60);
        const secs = bloco.start % 60;
        const tempo = `${mins}:${secs.toString().padStart(2,'0')}`;
        const miniLicaoHTML = bloco.miniLesson ? `<button class="toggle-btn mini-btn" onclick="toggleItem(this)">📘 Mini Lição <span class="seta">▾</span></button><div class="colapsavel mini-col"><div class="mini-aula-corpo"><strong>${bloco.miniLesson.title}</strong><br><br>${bloco.miniLesson.content}</div></div>` : '';
        blocoDiv.innerHTML = `
            <div class="italian"><span class="timestamp" data-time="${tempo}">(${tempo})</span>${bloco.italian}</div>
            <button class="toggle-btn trad-btn" onclick="toggleItem(this)">🌐 Tradução <span class="seta">▾</span></button>
            <button class="toggle-btn dica-btn" onclick="toggleItem(this)">💡 Dica <span class="seta">▾</span></button>
            ${miniLicaoHTML}
            <button class="mic-btn" onclick="iniciarPratica(this)">🎙️ Praticar Fala</button>
            <button class="ex-btn" onclick="abrirExercicios(this, ${index})">✏️ Exercícios</button>
            <button class="nota-btn" id="nota-btn-${index}" onclick="abrirNotas(${index})">📝 Anotações</button>
            <div class="colapsavel trad-col"><div class="traducao">${bloco.translation}</div></div>
            <div class="colapsavel dica-col"><div class="dica">${bloco.tip}</div></div>
            <div class="mic-resultado"></div>
        `;
        blocosContainer.appendChild(blocoDiv);
    });
    const ctaDiv = document.createElement('div');
    ctaDiv.className = 'quizlet-cta';
    ctaDiv.innerHTML = `<div class="quizlet-cta-inner"><div class="quizlet-cta-text"><span class="quizlet-cta-icon">🎯</span><div><strong>Pronto para praticar?</strong><p>Vocabulário completo da aula</p></div></div><button class="quizlet-btn" onclick="abrirQuizlet()">Abrir Quizlet →</button></div>`;
    blocosContainer.appendChild(ctaDiv);
    document.querySelectorAll(".timestamp").forEach(el => {
        el.addEventListener("click", () => {
            const t = el.dataset.time.split(":");
            video.currentTime = parseInt(t[0]) * 60 + parseInt(t[1]);
            video.play();
        });
    });
    iniciarDestaque();
    setTimeout(() => atualizarTodosOsBotoesNota(), 500);
}

function iniciarDestaque() {
    const blocos = document.querySelectorAll(".bloco");
    progressoLabel.textContent = `Parágrafo 1 de ${blocos.length}`;
    video.addEventListener("timeupdate", () => {
        const t = video.currentTime;
        blocos.forEach((bloco, i) => {
            const ini = parseFloat(bloco.dataset.start);
            const fim = blocos[i+1] ? parseFloat(blocos[i+1].dataset.start) : Infinity;
            if (t >= ini && t < fim) {
                currentBlockIndex = i;
                if (lastActiveIndex !== i) {
                    lastActiveIndex = i;
                    blocos.forEach(b => b.classList.remove("ativo"));
                    bloco.classList.add("ativo");
                    progressoLabel.textContent = `Parágrafo ${i+1} de ${blocos.length}`;
                    if (autoScroll) bloco.scrollIntoView({ behavior: "smooth", block: "center" });
                    if (document.getElementById('faPainel').classList.contains('aberto')) atualizarPainelAcoes();
                }
            }
        });
    });
}

document.getElementById("speedControl").addEventListener("change", function() { video.playbackRate = parseFloat(this.value); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') fecharQuizlet(); });
carregarPreferenciaVideo();

// ========== STORAGE COM FIREBASE ==========
const Storage = {
    async getAll() { return await _carregarCache(); },
    async getBloco(key) { const all = await this.getAll(); return all[key] || []; },
    async add(key, nota) { const all = await this.getAll(); if (!all[key]) all[key] = []; all[key].unshift(nota); await _persistir(all); },
    async update(key, notaId, novosDados) {
        const all = await this.getAll();
        if (!all[key]) return false;
        const index = all[key].findIndex(n => n.id === notaId);
        if (index === -1) return false;
        all[key][index] = { ...all[key][index], ...novosDados, data: dataFormatada() };
        await _persistir(all);
        return true;
    },
    async remove(key, notaId) { const all = await this.getAll(); if (!all[key]) return; all[key] = all[key].filter(n => n.id !== notaId); await _persistir(all); },
    async count(key) { const all = await this.getAll(); return (all[key] || []).length; }
};

let notaBlocoAtual = null, notaTabAtual = 'texto';
let notaEditando = null; // { id, tipo, dados }

function notaBlocoKey(index) { const aulaId = new URLSearchParams(window.location.search).get('aula') || '1'; return 'aula' + aulaId + '_bloco' + index; }

window.abrirNotas = async function(index) {
    notaBlocoAtual = index;
    notaEditando = null;
    const key = notaBlocoKey(index);
    const blocoEls = document.querySelectorAll('.bloco');
    const textoEl = blocoEls[index] ? blocoEls[index].querySelector('.italian') : null;
    const ref = textoEl ? textoEl.innerText.replace(/\(\d+:\d+\)\s*/, '').substring(0, 50) + '…' : ('Parágrafo ' + (index + 1));

    document.getElementById('notaFormEditar').classList.remove('ativo');

window.fecharNotas = function() {

    document.getElementById('notaFormEditar').classList.remove('ativo');

window.trocarTabNota = function(tipo, tabBtn) {
    notaTabAtual = tipo;
    document.querySelectorAll('.nota-form .nota-tab').forEach(t => t.classList.remove('ativo'));
    document.querySelectorAll('.nota-form .nota-form-campo').forEach(c => c.classList.remove('ativo'));

    document.getElementById('nota-campo-' + tipo).classList.add('ativo');

window.trocarTabEdicao = function(tipo, tabBtn) {

    tabBtn.classList.add('ativo');
    document.getElementById('editar-campo-' + tipo).classList.add('ativo');
};

window.salvarNota = async function() {
    if (notaBlocoAtual === null) return;
    const key = notaBlocoKey(notaBlocoAtual);
    let nota = null;
    if (notaTabAtual === 'texto') {
        let texto = document.getElementById('nota-input-texto').value.trim();
        if (!texto) { alert('Digite algum texto.'); return; }
        nota = { id: Date.now(), tipo: 'texto', conteudo: texto, data: dataFormatada() };
    } else if (notaTabAtual === 'link') {
        let url = document.getElementById('nota-input-link-url').value.trim();
        let label = document.getElementById('nota-input-link-label').value.trim() || url;
        if (!url) { alert('Digite uma URL.'); return; }
        if (!url.startsWith('http')) url = 'https://' + url;
        nota = { id: Date.now(), tipo: 'link', url: url, label: label, data: dataFormatada() };
    } else if (notaTabAtual === 'video') {
        let ytUrl = document.getElementById('nota-input-yt').value.trim();
        if (!ytUrl) { alert('Digite um link do YouTube.'); return; }
        let videoId = extrairYouTubeId(ytUrl);
        if (!videoId) { alert('Link do YouTube inválido!'); return; }
        nota = { id: Date.now(), tipo: 'video', videoId: videoId, url: ytUrl, data: dataFormatada() };
    }
    if (!nota) return;
    await Storage.add(key, nota);
    limparFormNota();
    await renderizarNotas(key);
    await atualizarBotaoNota(notaBlocoAtual);
    alert('✅ Anotação salva!');
};

window.editarNota = function(notaId, tipo, dados) {
    notaEditando = { id: notaId, tipo: tipo, dados: dados };
    const formEditar = document.getElementById('notaFormEditar');
    formEditar.classList.add('ativo');
    
    // Reset tabs e campos
    document.querySelectorAll('#notaFormEditar .nota-tab').forEach(t => t.classList.remove('ativo'));
    document.querySelectorAll('#notaFormEditar .nota-form-campo').forEach(c => c.classList.remove('ativo'));
    
    // Selecionar tab correta e preencher dados
    if (tipo === 'texto') {
        document.querySelector('#notaFormEditar .nota-tab[data-tipo="texto"]').classList.add('ativo');
        document.getElementById('editar-campo-texto').classList.add('ativo');
        document.getElementById('editar-input-texto').value = dados.conteudo || '';
    } else if (tipo === 'link') {
        document.querySelector('#notaFormEditar .nota-tab[data-tipo="link"]').classList.add('ativo');
        document.getElementById('editar-campo-link').classList.add('ativo');
        document.getElementById('editar-input-link-url').value = dados.url || '';
        document.getElementById('editar-input-link-label').value = dados.label || '';
    } else if (tipo === 'video') {
        document.querySelector('#notaFormEditar .nota-tab[data-tipo="video"]').classList.add('ativo');
        document.getElementById('editar-campo-video').classList.add('ativo');
        document.getElementById('editar-input-yt').value = dados.url || '';
    }
};

window.cancelarEdicao = function() {
    notaEditando = null;
    document.getElementById('notaFormEditar').classList.remove('ativo');
};

window.salvarEdicao = async function() {
    if (!notaEditando || notaBlocoAtual === null) return;
    const key = notaBlocoKey(notaBlocoAtual);
    let novosDados = {};
    
    if (notaEditando.tipo === 'texto') {
        const texto = document.getElementById('editar-input-texto').value.trim();
        if (!texto) { alert('Digite algum texto.'); return; }
        novosDados = { conteudo: texto };
    } else if (notaEditando.tipo === 'link') {
        let url = document.getElementById('editar-input-link-url').value.trim();
        let label = document.getElementById('editar-input-link-label').value.trim() || url;
        if (!url) { alert('Digite uma URL.'); return; }
        if (!url.startsWith('http')) url = 'https://' + url;
        novosDados = { url: url, label: label };
    } else if (notaEditando.tipo === 'video') {
        let ytUrl = document.getElementById('editar-input-yt').value.trim();
        if (!ytUrl) { alert('Digite um link do YouTube.'); return; }
        let videoId = extrairYouTubeId(ytUrl);
        if (!videoId) { alert('Link do YouTube inválido!'); return; }
        novosDados = { videoId: videoId, url: ytUrl };
    }
    
    await Storage.update(key, notaEditando.id, novosDados);
    notaEditando = null;
    document.getElementById('notaFormEditar').classList.remove('ativo');
    await renderizarNotas(key);
    await atualizarBotaoNota(notaBlocoAtual);
    alert('✅ Anotação atualizada!');
};

window.excluirNota = async function(notaId) {
    if (notaBlocoAtual === null) return;
    if (confirm('Tem certeza que deseja excluir esta anotação?')) {
        const key = notaBlocoKey(notaBlocoAtual);
        await Storage.remove(key, notaId);
        await renderizarNotas(key);
        await atualizarBotaoNota(notaBlocoAtual);
        alert('🗑️ Anotação excluída!');
    }
};

async function renderizarNotas(key) {
    const lista = document.getElementById('notaLista');
    const notas = await Storage.getBloco(key);
    if (notas.length === 0) { lista.innerHTML = '<div class="nota-vazia"><span>📝</span>Nenhuma anotação ainda.</div>'; return; }
    lista.innerHTML = notas.map(n => {
        let corpo = '';
        if (n.tipo === 'texto') corpo = escHtml(n.conteudo).replace(/\n/g, '<br>');
        else if (n.tipo === 'link') corpo = '<a href="' + escHtml(n.url) + '" target="_blank">' + escHtml(n.label) + '</a>';
        else if (n.tipo === 'video') corpo = '<div class="yt-embed"><iframe src="https://www.youtube.com/embed/' + escHtml(n.videoId) + '" allowfullscreen loading="lazy"></iframe></div>';
        const badgeMap = { texto: 'tipo-texto', link: 'tipo-link', video: 'tipo-video' };
        const labelMap = { texto: '📝 Texto', link: '🔗 Link', video: '▶️ Vídeo' };
        return `<div class="nota-item">
            <div class="nota-item-header">
                <span class="nota-item-tipo ${badgeMap[n.tipo]}">${labelMap[n.tipo]}</span>
                <span class="nota-item-data">${escHtml(n.data)}</span>
            </div>
            <div class="nota-item-conteudo">${corpo}</div>
            <div class="nota-item-acoes">
                <button class="nota-editar-btn" onclick="editarNota(${n.id}, '${n.tipo}', ${JSON.stringify(n).replace(/"/g, '&quot;')})">✏️ Editar</button>
                <button class="nota-excluir-btn" onclick="excluirNota(${n.id})">🗑️ Excluir</button>
            </div>
        </div>`;
    }).join('');
}

async function atualizarBotaoNota(index) {
    let btn = document.getElementById('nota-btn-' + index);
    if (!btn) return;
    let count = await Storage.count(notaBlocoKey(index));
    let badge = btn.querySelector('.nota-badge');
    if (badge) badge.remove();
    if (count > 0) {
        let sp = document.createElement('span');
        sp.className = 'nota-badge';
        sp.textContent = count;
        btn.appendChild(sp);
    }
}

window.atualizarTodosOsBotoesNota = async function() {
    const blocos = document.querySelectorAll('.bloco');
    for (let i = 0; i < blocos.length; i++) await atualizarBotaoNota(i);
};

function limparFormNota() { 
    ['nota-input-texto','nota-input-link-url','nota-input-link-label','nota-input-yt'].forEach(id => { 
        let el = document.getElementById(id); 
        if (el) el.value = ''; 
    }); 
}

function extrairYouTubeId(url) {
    if (!url) return null;
    url = url.trim();
    let patterns = [/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/, /youtube\.com\/watch\?.*[&?]v=([a-zA-Z0-9_-]{11})/, /^([a-zA-Z0-9_-]{11})$/];
    for (let p of patterns) { let m = url.match(p); if (m && m[1]) return m[1]; }
    return null;
}

function dataFormatada() { return new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
function escHtml(str) { return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ========== PRÁTICA DE FALA ==========
let praticaTextoEsperado = '';
let praticaRecognition = null;

window.abrirPraticaModal = function(textoItaliano) {
    praticaTextoEsperado = textoItaliano;
    document.getElementById('praticaFrase').innerHTML = `<em>"${textoItaliano}"</em>`;
    document.getElementById('praticaModalRef').textContent = 'Frase em ' + ((window.IDIOMA_CONFIG && window.IDIOMA_CONFIG.nome) || 'idioma');
    document.getElementById('praticaResultadoArea').style.display = 'none';
    document.getElementById('praticaStatus').innerHTML = '';
    const btn = document.getElementById('praticaGravarBtn');
    btn.innerHTML = '🎙️ Clique e fale';
    btn.classList.remove('gravando');
    document.getElementById('praticaModal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
};

window.fecharPraticaModal = function() {
    if (praticaRecognition) { praticaRecognition.stop(); praticaRecognition = null; }
    document.getElementById('praticaModal').style.display = 'none';
    document.body.style.overflow = '';
};

window.ouvirFrasePratica = function() {
    if (!praticaTextoEsperado) return;
    const utterance = new SpeechSynthesisUtterance(praticaTextoEsperado);
    utterance.lang = (window.IDIOMA_CONFIG && (window.IDIOMA_CONFIG.codigoVoz || window.IDIOMA_CONFIG.codigo)) || 'pt-BR';
    utterance.rate = 0.8;
    speechSynthesis.cancel();
    speechSynthesis.speak(utterance);
};

window.iniciarGravacaoPratica = function() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { alert('Seu navegador não suporta reconhecimento de fala.'); return; }
    const btn = document.getElementById('praticaGravarBtn');
    const statusEl = document.getElementById('praticaStatus');
    const resultadoArea = document.getElementById('praticaResultadoArea');
    const resultadoEl = document.getElementById('praticaResultado');
    if (btn.classList.contains('gravando')) { if (praticaRecognition) praticaRecognition.stop(); return; }
    if (praticaRecognition) praticaRecognition.stop();
    btn.classList.add('gravando');
    btn.innerHTML = '⏹️ Parar gravação';
    statusEl.innerHTML = '🎤 Ouvindo... fale agora!';
    resultadoArea.style.display = 'none';
    const recognition = new SpeechRecognition();
    recognition.lang = (window.IDIOMA_CONFIG && (window.IDIOMA_CONFIG.codigoVoz || window.IDIOMA_CONFIG.codigo)) || 'pt-BR';
    recognition.interimResults = false;
    recognition.maxAlternatives = 3;
    praticaRecognition = recognition;
    recognition.onresult = function(event) {
        const melhor = event.results[0][0].transcript.toLowerCase().trim();
        const normalizar = t => t.replace(/[.,!?;:""''\u00E0\u00E8\u00E9\u00EC\u00F2\u00F9]/g,'').trim().toLowerCase();
        const textoNorm = normalizar(praticaTextoEsperado);
        const melhorNorm = normalizar(melhor);
        const palavrasTexto = textoNorm.split(/\s+/);
        const palavrasFala = melhorNorm.split(/\s+/);
        const emComum = palavrasTexto.filter(p => palavrasFala.includes(p)).length;
        const pct = emComum / palavrasTexto.length;
        let resultadoClass = '', resultadoHTML = '';
        if (pct >= 0.85) {
            resultadoClass = 'acerto';
            resultadoHTML = `✅ <strong>Ótimo trabalho!</strong><br>Você disse:<br><em>"${melhor}"</em><br><br>🎉 Pronúncia correta!`;
        } else if (pct >= 0.5) {
            resultadoClass = 'parcial';
            resultadoHTML = `🟡 <strong>Quase lá!</strong><br>Você disse:<br><em>"${melhor}"</em><br><br><span style="font-size:0.85rem;">Esperado:<br><strong>"${praticaTextoEsperado}"</strong></span>`;
        } else {
            resultadoClass = 'erro';
            resultadoHTML = `❌ <strong>Tente novamente.</strong><br>Você disse:<br><em>"${melhor}"</em><br><br><span style="font-size:0.85rem;">Esperado:<br><strong>"${praticaTextoEsperado}"</strong></span><br><br>💡 Fale mais devagar.`;
        }
        resultadoEl.className = 'pratica-resultado ' + resultadoClass;
        resultadoEl.innerHTML = resultadoHTML;
        resultadoArea.style.display = 'block';
        statusEl.innerHTML = '✅ Gravação finalizada!';
        btn.classList.remove('gravando');
        btn.innerHTML = '🎙️ Tentar novamente';
        praticaRecognition = null;
    };
    recognition.onerror = function() {
        resultadoEl.className = 'pratica-resultado erro';
        resultadoEl.innerHTML = '❌ Erro no microfone. Tente novamente.';
        resultadoArea.style.display = 'block';
        statusEl.innerHTML = '⚠️ Erro na gravação';
        btn.classList.remove('gravando');
        btn.innerHTML = '🎙️ Clique e fale';
        praticaRecognition = null;
    };
    recognition.onend = function() {
        if (btn.classList.contains('gravando')) {
            btn.classList.remove('gravando');
            btn.innerHTML = '🎙️ Clique e fale';
            if (statusEl.innerHTML === '🎤 Ouvindo... fale agora!') statusEl.innerHTML = '⏱️ Nada detectado.';
            praticaRecognition = null;
        }
    };
    recognition.start();
};

    const bloco = btn.closest('.bloco');

// ========== EXERCÍCIOS ==========
let exDados = [], exFila = [], exAtual = 0, exAcertos = 0, exRespondido = false, exOrdenarSelecionadas = [], exPronunciaRecognition = null;

window.abrirExercicios = async function(btn, blocoIndex) {
    const aulaId = new URLSearchParams(window.location.search).get('aula') || '1';
    try {
        const res = await fetch(`dados/exercicios_aula${aulaId}.json`);
        const data = await res.json();
        const paragrafo = data.paragrafos[blocoIndex];
        if (!paragrafo || !paragrafo.exercises || paragrafo.exercises.length === 0) { alert('Nenhum exercício disponível.'); return; }
        exDados = paragrafo.exercises;
        iniciarSessaoExercicios();
    } catch(e) { alert('Erro ao carregar exercícios.'); }
    document.getElementById('exModal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
};

window.fecharExercicios = function() { document.getElementById('exModal').style.display = 'none'; document.body.style.overflow = ''; };
function iniciarSessaoExercicios() { exFila = embaralhar([...exDados]).slice(0, 5); exAtual = 0; exAcertos = 0; renderizarExercicio(); }
function embaralhar(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
function atualizarProgresso() { const total = exFila.length; document.getElementById('exProgresso').textContent = `Questão ${exAtual + 1} de ${total}`; document.getElementById('exProgressoFill').style.width = `${(exAtual / total) * 100}%`; }

function renderizarExercicio() {
    if (exAtual >= exFila.length) { mostrarPlacar(); return; }
    exRespondido = false;
    exOrdenarSelecionadas = [];
    if (exPronunciaRecognition) { exPronunciaRecognition.stop(); exPronunciaRecognition = null; }
    atualizarProgresso();
    const ex = exFila[exAtual];
    const corpo = document.getElementById('exCorpo');
    const badgeClasse = { 'multipla': 'badge-multipla', 'lacuna': 'badge-lacuna', 'ordenar': 'badge-ordenar', 'traduzir': 'badge-traduzir', 'pronuncia': 'badge-pronuncia' }[ex.tipo] || 'badge-multipla';
    const badgeLabel = { 'multipla': '🔵 Múltipla escolha', 'lacuna': '🟣 Completar lacuna', 'ordenar': '🟡 Ordenar palavras', 'traduzir': '🟢 Tradução', 'pronuncia': '🎤 Pronúncia' }[ex.tipo] || ex.tipo;
    let htmlInterativo = '';
    if (ex.tipo === 'multipla') {
        const opcoes = embaralhar([...ex.opcoes]);
        htmlInterativo = `<div class="ex-opcoes">${opcoes.map(op => `<button class="ex-opcao" onclick="responderMultipla(this, '${escapar(op)}', '${escapar(ex.resposta)}')">${op}</button>`).join('')}</div>`;
    } else if (ex.tipo === 'lacuna') {
        const partes = ex.pergunta.split('___');
        htmlInterativo = `<div class="ex-lacuna-wrap"><span>${partes[0]}</span><input class="ex-lacuna-input" id="exLacunaInput" type="text" placeholder="..." autocomplete="off" /><span>${partes[1] || ''}</span></div>`;
    } else if (ex.tipo === 'ordenar') {
        const palavras = embaralhar([...ex.palavras]);
        htmlInterativo = `<div class="ex-area-label">Sua resposta</div><div class="ex-palavras-area" id="exOrdenarArea"></div><div class="ex-area-label" style="margin-top:10px">Palavras disponíveis</div><div class="ex-palavra-banco" id="exPalavraBanco">${palavras.map((p, i) => `<button class="ex-palavra" data-idx="${i}" data-palavra="${escapar(p)}" onclick="selecionarPalavra(this)">${p}</button>`).join('')}</div>`;
    } else if (ex.tipo === 'traduzir') {
        htmlInterativo = `<textarea class="ex-textarea" id="exTraduzirInput" rows="3" placeholder="Digite sua tradução em português..."></textarea>`;
    } else if (ex.tipo === 'pronuncia') {
        const palavras = ex.palavras || [ex.resposta];
        htmlInterativo = `<div class="ex-pronuncia-area"><div class="ex-palavra-destaque">${palavras.map(p => `<span class="pronuncia-word">${p}</span>`).join(' · ')}</div><div class="ex-pronuncia-botoes"><button class="ex-ouvir-btn" onclick="ouvirPronuncia('${escapar(ex.resposta)}')">🔊 Ouvir</button><button class="ex-gravar-btn" id="exGravarBtn" onclick="gravarPronuncia(this, '${escapar(ex.resposta)}')">🎙️ Gravar</button></div><div class="mic-resultado" id="exPronunciaResultado" style="display:none"></div></div>`;
    }
    const perguntaHTML = ex.tipo === 'lacuna' ? `<div class="ex-pergunta">${ex.enunciado || 'Complete:'}</div>` : `<div class="ex-pergunta">${ex.pergunta || 'Pratique:'}</div>`;
    corpo.innerHTML = `<span class="ex-tipo-badge ${badgeClasse}">${badgeLabel}</span>${perguntaHTML}${htmlInterativo}<div class="ex-feedback" id="exFeedback"></div><div class="ex-acoes"><button class="ex-confirmar" id="exConfirmar" onclick="confirmarResposta()">Confirmar</button><button class="ex-proximo" id="exProximo" onclick="proximoExercicio()">Próximo →</button></div>`;
    if (ex.tipo === 'lacuna') { setTimeout(() => document.getElementById('exLacunaInput')?.focus(), 100); document.getElementById('exLacunaInput')?.addEventListener('keydown', e => { if (e.key === 'Enter' && !exRespondido) confirmarResposta(); }); }
    if (ex.tipo === 'traduzir') { setTimeout(() => document.getElementById('exTraduzirInput')?.focus(), 100); }
    if (ex.tipo === 'pronuncia') { setTimeout(() => { const confirmBtn = document.getElementById('exConfirmar'); if (confirmBtn) confirmBtn.style.display = 'none'; }, 100); }
}

window.ouvirPronuncia = function(texto) {
    const utterance = new SpeechSynthesisUtterance(texto);
    utterance.lang = (window.IDIOMA_CONFIG && (window.IDIOMA_CONFIG.codigoVoz || window.IDIOMA_CONFIG.codigo)) || 'pt-BR';
    utterance.rate = 0.8;
    speechSynthesis.cancel();
    speechSynthesis.speak(utterance);
};

window.gravarPronuncia = function(btn, textoEsperado) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { alert('Reconhecimento de fala não suportado.'); return; }
    if (btn.classList.contains('gravando')) { if (exPronunciaRecognition) exPronunciaRecognition.stop(); return; }
    if (exPronunciaRecognition) exPronunciaRecognition.stop();
    const resultado = document.getElementById('exPronunciaResultado');
    const recognition = new SpeechRecognition();
    recognition.lang = (window.IDIOMA_CONFIG && (window.IDIOMA_CONFIG.codigoVoz || window.IDIOMA_CONFIG.codigo)) || 'pt-BR';
    recognition.interimResults = false;
    exPronunciaRecognition = recognition;
    btn.classList.add('gravando');
    btn.innerHTML = '⏹️ Parar';
    resultado.style.display = 'none';
    resultado.className = 'mic-resultado';
    recognition.onresult = function(event) {
        const falado = event.results[0][0].transcript.toLowerCase().trim();
        const normalizar = t => t.replace(/[.,!?;:""''\u00E0\u00E8\u00E9\u00EC\u00F2\u00F9]/g,'').trim().toLowerCase();
        const esperadoNorm = normalizar(textoEsperado);
        const faladoNorm = normalizar(falado);
        const palavrasEsperadas = esperadoNorm.split(/\s+/);
        const palavrasFaladas = faladoNorm.split(/\s+/);
        const emComum = palavrasEsperadas.filter(p => palavrasFaladas.includes(p)).length;
        const pct = emComum / palavrasEsperadas.length;
        resultado.style.display = 'block';
        if (pct >= 0.8) {
            resultado.className = 'mic-resultado acerto';
            resultado.innerHTML = `✅ Ótimo! "${falado}"<br>🎉 Correto!`;
            if (!exRespondido) { exAcertos++; exRespondido = true; document.getElementById('exConfirmar').style.display = 'none'; document.getElementById('exProximo').style.display = 'block'; }
        } else if (pct >= 0.5) {
            resultado.className = 'mic-resultado parcial';
            resultado.innerHTML = `🟡 Quase lá! "${falado}"<br>Esperado: "${textoEsperado}"`;
        } else {
            resultado.className = 'mic-resultado erro';
            resultado.innerHTML = `❌ Tente novamente. "${falado}"<br>Esperado: "${textoEsperado}"`;
        }
    };
    recognition.onerror = function() { resultado.style.display = 'block'; resultado.className = 'mic-resultado erro'; resultado.innerHTML = '❌ Erro no microfone.'; };
    recognition.onend = function() { btn.classList.remove('gravando'); btn.innerHTML = '🎙️ Gravar'; exPronunciaRecognition = null; };
    recognition.start();
};

window.selecionarPalavra = function(btn) {
    if (exRespondido) return;
    const palavra = btn.dataset.palavra;
    exOrdenarSelecionadas.push(palavra);
    btn.classList.add('usada');
    const area = document.getElementById('exOrdenarArea');
    const chip = document.createElement('button');
    chip.className = 'ex-palavra selecionada';
    chip.textContent = palavra;
    chip.onclick = function() {
        if (exRespondido) return;
        const idx = exOrdenarSelecionadas.lastIndexOf(palavra);
        if (idx !== -1) exOrdenarSelecionadas.splice(idx, 1);
        document.querySelector(`.ex-palavra-banco .ex-palavra[data-idx="${btn.dataset.idx}"]`)?.classList.remove('usada');
        chip.remove();
    };
    area.appendChild(chip);
};

window.confirmarResposta = function() {
    if (exRespondido) return;
    const ex = exFila[exAtual];
    let certa = false, feedbackExtra = '';
    if (ex.tipo === 'multipla') return;
    if (ex.tipo === 'lacuna') {
        const input = document.getElementById('exLacunaInput');
        const resposta = input.value.trim().toLowerCase();
        const esperada = ex.resposta.toLowerCase();
        certa = resposta === esperada || (ex.alternativas || []).map(a => a.toLowerCase()).includes(resposta);
        input.classList.add(certa ? 'certa' : 'errada');
        if (!certa) feedbackExtra = `<br>Correta: <strong>${ex.resposta}</strong>`;
        if (certa) exAcertos++;
        exRespondido = true;
    } else if (ex.tipo === 'ordenar') {
        const frase = exOrdenarSelecionadas.join(' ').toLowerCase().trim();
        certa = frase === ex.resposta.toLowerCase().trim();
        if (!certa) feedbackExtra = `<br>Correta: <strong>${ex.resposta}</strong>`;
        if (certa) exAcertos++;
        exRespondido = true;
        document.querySelectorAll('#exOrdenarArea .ex-palavra').forEach(p => { p.style.borderColor = certa ? '#5cb85c' : '#e05c5c'; p.style.background = certa ? '#e8f5ef' : '#fff0f0'; });
    } else if (ex.tipo === 'traduzir') {
        const input = document.getElementById('exTraduzirInput');
        const resposta = input.value.trim().toLowerCase();
        const palavrasChave = ex.palavrasChave || ex.resposta.toLowerCase().split(/\s+/).filter(p => p.length > 3);
        const acertos = palavrasChave.filter(p => resposta.includes(p)).length;
        certa = acertos >= Math.ceil(palavrasChave.length * 0.6);
        input.style.borderColor = certa ? '#5cb85c' : '#e05c5c';
        feedbackExtra = `<br>Exemplo: <em>${ex.resposta}</em>`;
        if (certa) exAcertos++;
        exRespondido = true;
    } else if (ex.tipo === 'pronuncia') {
        if (!exRespondido) { feedbackExtra = `<br>⚠️ Grave primeiro!`; mostrarFeedback(false, ex.explicacao, feedbackExtra); return; }
        mostrarFeedback(true, ex.explicacao, '');
        document.getElementById('exConfirmar').style.display = 'none';
        document.getElementById('exProximo').style.display = 'block';
        return;
    }
    mostrarFeedback(certa, ex.explicacao, feedbackExtra);
    if (exRespondido) { document.getElementById('exConfirmar').style.display = 'none'; document.getElementById('exProximo').style.display = 'block'; }
};

window.responderMultipla = function(btn, opcao, resposta) {
    if (exRespondido) return;
    exRespondido = true;
    const certa = opcao === resposta;
    if (certa) exAcertos++;
    document.querySelectorAll('.ex-opcao').forEach(b => { b.disabled = true; if (b.textContent.trim() === resposta) b.classList.add('certa'); });
    btn.classList.add(certa ? 'certa' : 'errada');
    const ex = exFila[exAtual];
    mostrarFeedback(certa, ex.explicacao, certa ? '' : `<br>Correta: <strong>${resposta}</strong>`);
    document.getElementById('exConfirmar').style.display = 'none';
    document.getElementById('exProximo').style.display = 'block';
};

function mostrarFeedback(certa, explicacao, extra) {
    const fb = document.getElementById('exFeedback');
    fb.className = 'ex-feedback ' + (certa ? 'certa' : 'errada');
    fb.innerHTML = (certa ? '✅ Correto!' : '❌ Incorreto.') + (extra || '') + (explicacao ? `<br><span style="opacity:0.8;font-size:0.8rem">${explicacao}</span>` : '');
}

window.proximoExercicio = function() { exAtual++; renderizarExercicio(); };
function mostrarPlacar() {
    const total = exFila.length, pct = Math.round((exAcertos / total) * 100);
    const emoji = pct >= 80 ? '🏆' : pct >= 50 ? '👍' : '💪';
    const msg = pct >= 80 ? 'Excelente!' : pct >= 50 ? 'Bom progresso!' : 'Continue praticando!';
    document.getElementById('exProgresso').textContent = 'Resultado';
    document.getElementById('exProgressoFill').style.width = '100%';
    document.getElementById('exCorpo').innerHTML = `<div class="ex-placar"><div class="ex-placar-emoji">${emoji}</div><div class="ex-placar-titulo">${msg}</div><div class="ex-placar-score">${exAcertos}/${total} (${pct}%)</div><button class="ex-reiniciar" onclick="iniciarSessaoExercicios()">🔄 Praticar novamente</button></div>`;
}
function escapar(str) { return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

carregarAula();
</script>
