<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Italiano — Aula</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ========== TODOS OS SEUS ESTILOS ORIGINAIS ========== */
:root{
    --verde:#1a6b4a;
    --verde-claro:#e8f5ef;
    --amarelo:#fff3a3;
    --cinza-bg:#f7f6f2;
    --texto:#1c1c1c;
}
*{ box-sizing:border-box; margin:0; padding:0; }
body{ font-family:'DM Sans',sans-serif; background:var(--cinza-bg); color:var(--texto); }

.container{
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}

.video-area{
    width:100%;
    background:#0f1f17;
    padding:16px 24px;
    flex-shrink:0;
    height:33vh;
    min-height:260px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:6px;
    border-bottom:3px solid var(--verde);
}
video{ 
    width:100%; 
    height:auto;
    max-height:calc(33vh - 40px);
    border-radius:14px; 
    background:black; 
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
    object-fit:contain;
}
.progresso-label{ 
    color:#7fb99a; 
    font-size:0.7rem; 
    text-align:right; 
    margin-top:-2px;
}

.texto-area{
    flex:1;
    background:white;
    overflow-y:auto;
    padding:16px 24px 100px;
    font-size:17px;
    line-height:1.85;
    scroll-behavior:smooth;
}
.texto-area::-webkit-scrollbar{ width:5px; }
.texto-area::-webkit-scrollbar-track{ background:#f0f0f0; }
.texto-area::-webkit-scrollbar-thumb{ background:#b5d4c5; border-radius:4px; }

.texto-header{
    display:none;
}

.global-toggles{ 
    display:flex; 
    gap:8px; 
    flex-wrap:wrap; 
    justify-content:center; 
    margin-bottom:20px;
    padding-bottom:12px;
    border-bottom:1px solid #eee;
}
.global-btn{
    padding:5px 12px; border-radius:20px; border:1.5px solid;
    cursor:pointer; font-size:0.72rem; font-weight:700;
    background:transparent; font-family:'DM Sans',sans-serif; transition:all 0.2s;
}
.global-btn.trad{ color:#3a7d5f; border-color:#b5d4c5; }
.global-btn.trad:hover{ background:#e8f5ef; }
.global-btn.dica-g{ color:#7a6200; border-color:#e0c93a; }
.global-btn.dica-g:hover{ background:#fffbea; }

.bloco{ margin-bottom:20px; padding:14px 16px; border-radius:14px; transition:all 0.35s ease; border:1.5px solid #ebebeb; background:white; }
.bloco.ativo{ background:var(--amarelo); border-color:#e0c93a; box-shadow:0 4px 20px rgba(224,201,58,0.25); transform:scale(1.01); }

.italiano{ margin-bottom:6px; font-family:'Lora',serif; font-size:0.98rem; color:#1c1c1c; }

.toggle-btn{
    display:inline-flex; align-items:center; gap:4px;
    margin-top:6px; margin-right:4px;
    padding:3px 8px; border-radius:20px; border:1.5px solid;
    cursor:pointer; font-size:0.68rem; font-weight:700;
    background:transparent; transition:all 0.2s;
    font-family:'DM Sans',sans-serif; line-height:1.4;
}
.toggle-btn.trad-btn{ color:#3a7d5f; border-color:#b5d4c5; }
.toggle-btn.trad-btn:hover{ background:#e8f5ef; }
.toggle-btn.dica-btn{ color:#7a6200; border-color:#e0c93a; }
.toggle-btn.dica-btn:hover{ background:#fffbea; }
.toggle-btn .seta{ transition:transform 0.25s; display:inline-block; font-size:0.65rem; }
.toggle-btn.aberto .seta{ transform:rotate(180deg); }

.colapsavel{ overflow:hidden; max-height:0; opacity:0; transition:max-height 0.4s ease, opacity 0.3s ease; }
.colapsavel.aberto{ max-height:400px; opacity:1; margin-top:8px; }

.traducao{
    color:#555; font-style:italic; background:#f4f4f0;
    padding:8px 10px; border-radius:10px;
    font-size:0.88rem; border-left:3px solid #b5d4c5;
}

.dica{
    background:#fffbea; border:1px solid #f0e060;
    border-radius:10px; padding:8px 10px;
    font-size:0.82rem; color:#4a3f00; line-height:1.55;
}

details{ 
    border-radius:10px; 
    margin-top:8px; 
    overflow:hidden; 
    border:1px solid #e2ede8; 
}
summary{
    cursor:pointer; font-weight:700; font-size:0.82rem;
    padding:8px 12px; background:#eaf4ef; color:var(--verde);
    user-select:none; list-style:none; display:flex;
    align-items:center; gap:6px; transition:background 0.2s;
}
summary:hover{ background:#d6ede3; }
summary::after{ content:'▾'; margin-left:auto; font-size:0.9rem; transition:transform 0.3s; }
details[open] summary::after{ transform:rotate(180deg); }
.mini-aula-corpo{ 
    padding:10px 12px; 
    background:#f9fdf9; 
    font-size:0.85rem; 
    line-height:1.65; 
    color:#2a2a2a; 
}
.mini-aula-corpo strong{ color:var(--verde); }
.mini-aula-corpo .exemplo{
    background:#e8f5ef; border-radius:8px; padding:8px 12px;
    margin-top:8px; font-style:italic; font-size:0.82rem;
    border-left:3px solid var(--verde);
}

.timestamp{
    color:var(--verde); cursor:pointer; font-weight:700;
    font-family:'DM Sans',sans-serif; font-size:0.75rem;
    background:#e8f5ef; padding:2px 6px; border-radius:6px;
    margin-right:6px; transition:background 0.2s;
}
.timestamp:hover{ background:var(--verde); color:white; }

.floating-controls{
    position:fixed; bottom:16px; right:16px; z-index:9999;
    background:rgba(15,31,23,0.95); padding:6px 12px;
    border-radius:18px; display:flex; gap:5px; flex-wrap:wrap;
    align-items:center; box-shadow:0 8px 32px rgba(0,0,0,0.3);
    border:1px solid #2a4a35;
}
.floating-controls button,
.floating-controls select{
    border:none; padding:5px 8px; border-radius:8px;
    cursor:pointer; font-size:12px; background:#2a4a35;
    color:white; transition:background 0.2s;
}
.floating-controls button:hover{ background:var(--verde); }
.floating-controls select{ background:#2a4a35; color:white; }

@media(max-width:900px){
    .video-area{ min-height:220px; padding:12px 16px; }
    video{ max-height:calc(33vh - 30px); }
    .floating-controls{ left:10px; right:10px; bottom:10px; justify-content:center; }
    .texto-area{ padding:12px 16px 80px; }
    .bloco{ padding:12px 14px; margin-bottom:16px; }
    .global-toggles{ margin-bottom:16px; gap:6px; }
    .global-btn{ padding:4px 10px; font-size:0.68rem; }
}

.quizlet-cta{
    margin-top: 24px;
    margin-bottom: 12px;
    border-radius: 14px;
    background: linear-gradient(135deg, #0f1f17 0%, #1a3d2b 100%);
    border: 1.5px solid #2a5c3f;
    overflow: hidden;
}
.quizlet-cta-inner{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 12px 16px;
    flex-wrap: wrap;
}
.quizlet-cta-text{
    display: flex;
    align-items: center;
    gap: 8px;
    color: #e8f5ef;
}
.quizlet-cta-icon{ font-size: 1.4rem; flex-shrink: 0; }
.quizlet-cta-text strong{ display: block; font-size: 0.85rem; color: #e8f5ef; margin-bottom: 2px; }
.quizlet-cta-text p{ font-size: 0.65rem; color: #7fb99a; margin: 0; }
.quizlet-btn{
    background: #3fb950;
    color: #0d1117;
    border: none;
    padding: 6px 14px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    letter-spacing: 0.01em;
    flex-shrink: 0;
}
.quizlet-btn:hover{
    background: #52d363;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(63,185,80,0.35);
}

.qmodal{
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s ease;
}
@keyframes fadeIn{
    from{ opacity:0; }
    to{ opacity:1; }
}
.qmodal-overlay{
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
}
.qmodal-box{
    position: relative;
    width: 94vw;
    max-width: 860px;
    height: 90vh;
    background: #0d1117;
    border-radius: 20px;
    overflow: hidden;
    border: 1.5px solid #30363d;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    animation: slideUp 0.3s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp{
    from{ transform: translateY(40px); opacity:0; }
    to{ transform: translateY(0); opacity:1; }
}
.qmodal-close{
    position: absolute;
    top: 12px;
    right: 14px;
    z-index: 10;
    background: rgba(255,255,255,0.08);
    border: none;
    color: #e6edf3;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
}
.qmodal-close:hover{ background: rgba(248,81,73,0.3); }
.qmodal-frame{
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}

/* Botão voltar para home */
.btn-home {
    background: #58a6ff;
}

.btn-home:hover {
    background: #1f6feb;
}

/* ===== BOTÃO MICROFONE ===== */
.mic-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 6px;
    margin-right: 4px;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1.5px solid #c7a0d8;
    cursor: pointer;
    font-size: 0.68rem;
    font-weight: 700;
    background: transparent;
    color: #7a3fa0;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    line-height: 1.4;
}
.mic-btn:hover { background: #f5eaff; }
.mic-btn.gravando {
    background: #ffeaea;
    border-color: #e05c5c;
    color: #c0392b;
    animation: pulso 1s infinite;
}
@keyframes pulso {
    0%, 100% { box-shadow: 0 0 0 0 rgba(224,92,92,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(224,92,92,0); }
}

.mic-resultado {
    margin-top: 8px;
    padding: 8px 10px;
    border-radius: 10px;
    font-size: 0.82rem;
    line-height: 1.5;
    display: none;
}
.mic-resultado.acerto {
    background: #e8f5ef;
    border: 1px solid #5cb85c;
    color: #1a6b3a;
    display: block;
}
.mic-resultado.erro {
    background: #fff0f0;
    border: 1px solid #e05c5c;
    color: #8b1a1a;
    display: block;
}
.mic-resultado.parcial {
    background: #fffbea;
    border: 1px solid #e0c93a;
    color: #5a4a00;
    display: block;
}

/* ===== BOTÃO EXERCÍCIOS ===== */
.ex-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 6px;
    margin-right: 4px;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1.5px solid #a0c4f8;
    cursor: pointer;
    font-size: 0.68rem;
    font-weight: 700;
    background: transparent;
    color: #1a56a0;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    line-height: 1.4;
}
.ex-btn:hover { background: #e8f0fe; }

/* ===== MODAL EXERCÍCIOS ===== */
.exmodal {
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn 0.2s ease;
}
.exmodal-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(3px);
}
.exmodal-box {
    position: relative;
    width: 100%;
    max-width: 680px;
    max-height: 88vh;
    background: #fff;
    border-radius: 24px 24px 0 0;
    overflow-y: auto;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.25);
    animation: slideUpEx 0.32s cubic-bezier(.4,0,.2,1);
    padding: 24px 20px 32px;
}
@keyframes slideUpEx {
    from { transform: translateY(60px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
}
.exmodal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
}
.exmodal-titulo {
    font-size: 0.78rem;
    font-weight: 700;
    color: #1a56a0;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.exmodal-close {
    background: #f0f0f0;
    border: none;
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
}
.exmodal-close:hover { background: #e0e0e0; }

.ex-progresso {
    font-size: 0.7rem;
    color: #999;
    margin-bottom: 16px;
}
.ex-progresso-bar {
    height: 4px;
    background: #eee;
    border-radius: 4px;
    margin-bottom: 18px;
    overflow: hidden;
}
.ex-progresso-fill {
    height: 100%;
    background: var(--verde);
    border-radius: 4px;
    transition: width 0.4s ease;
}

.ex-tipo-badge {
    display: inline-block;
    font-size: 0.62rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
}
.badge-multipla  { background: #e8f0fe; color: #1a56a0; }
.badge-lacuna    { background: #fce8ff; color: #7a1fa0; }
.badge-ordenar   { background: #fff3cd; color: #7a5500; }
.badge-traduzir  { background: #e8f5ef; color: #1a6b4a; }

.ex-pergunta {
    font-family: 'Lora', serif;
    font-size: 1.05rem;
    line-height: 1.6;
    color: #1c1c1c;
    margin-bottom: 18px;
}
.ex-pergunta em { color: var(--verde); font-style: normal; font-weight: 600; }

/* Múltipla escolha */
.ex-opcoes { display: flex; flex-direction: column; gap: 8px; }
.ex-opcao {
    padding: 10px 14px;
    border-radius: 12px;
    border: 1.5px solid #ddd;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.18s;
    background: #fafafa;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
}
.ex-opcao:hover:not(:disabled) { border-color: #a0c4f8; background: #e8f0fe; }
.ex-opcao.certa  { background: #e8f5ef; border-color: #5cb85c; color: #1a6b3a; font-weight: 700; }
.ex-opcao.errada { background: #fff0f0; border-color: #e05c5c; color: #8b1a1a; }
.ex-opcao:disabled { cursor: default; }

/* Preencher lacuna */
.ex-lacuna-wrap { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.ex-lacuna-input {
    border: none;
    border-bottom: 2px solid #a0c4f8;
    outline: none;
    font-size: 1rem;
    font-family: 'Lora', serif;
    padding: 2px 4px;
    width: 140px;
    text-align: center;
    background: transparent;
    color: #1c1c1c;
    transition: border-color 0.2s;
}
.ex-lacuna-input:focus { border-color: #1a56a0; }
.ex-lacuna-input.certa { border-color: #5cb85c; color: #1a6b3a; font-weight: 700; }
.ex-lacuna-input.errada { border-color: #e05c5c; color: #8b1a1a; }

/* Ordenar palavras */
.ex-palavras-area { display: flex; flex-wrap: wrap; gap: 6px; min-height: 44px; margin-bottom: 10px; }
.ex-palavra-banco { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px; background: #f5f5f5; border-radius: 12px; min-height: 44px; }
.ex-palavra {
    padding: 5px 10px;
    border-radius: 8px;
    border: 1.5px solid #ccc;
    background: white;
    cursor: pointer;
    font-family: 'Lora', serif;
    font-size: 0.9rem;
    transition: all 0.15s;
    user-select: none;
}
.ex-palavra:hover { border-color: #a0c4f8; background: #e8f0fe; }
.ex-palavra.usada { opacity: 0.3; cursor: default; pointer-events: none; }
.ex-palavra.selecionada { background: #e8f0fe; border-color: #1a56a0; }
.ex-area-label { font-size: 0.7rem; color: #999; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }

/* Traduzir */
.ex-textarea {
    width: 100%;
    border: 1.5px solid #ddd;
    border-radius: 12px;
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    resize: none;
    outline: none;
    line-height: 1.5;
    transition: border-color 0.2s;
    color: #1c1c1c;
}
.ex-textarea:focus { border-color: #a0c4f8; }

/* Feedback */
.ex-feedback {
    margin-top: 14px;
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 0.85rem;
    line-height: 1.5;
    display: none;
}
.ex-feedback.certa  { background: #e8f5ef; border: 1px solid #5cb85c; color: #1a6b3a; display: block; }
.ex-feedback.errada { background: #fff0f0; border: 1px solid #e05c5c; color: #8b1a1a; display: block; }

/* Botões de ação */
.ex-acoes { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
.ex-confirmar {
    flex: 1;
    padding: 10px 16px;
    border-radius: 12px;
    border: none;
    background: #1a56a0;
    color: white;
    font-weight: 700;
    font-size: 0.88rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.2s;
}
.ex-confirmar:hover { background: #1244820; }
.ex-confirmar:disabled { background: #bbb; cursor: default; }
.ex-proximo {
    flex: 1;
    padding: 10px 16px;
    border-radius: 12px;
    border: 1.5px solid var(--verde);
    background: transparent;
    color: var(--verde);
    font-weight: 700;
    font-size: 0.88rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    display: none;
}
.ex-proximo:hover { background: var(--verde-claro); }

/* Placar final */
.ex-placar {
    text-align: center;
    padding: 20px 0;
}
.ex-placar-emoji { font-size: 3rem; margin-bottom: 8px; }
.ex-placar-titulo { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; color: #1c1c1c; }
.ex-placar-sub { font-size: 0.85rem; color: #666; }
.ex-placar-score { font-size: 2rem; font-weight: 700; color: var(--verde); margin: 12px 0; }
.ex-reiniciar {
    margin-top: 16px;
    padding: 10px 24px;
    border-radius: 12px;
    border: none;
    background: var(--verde);
    color: white;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.2s;
}
.ex-reiniciar:hover { background: #145c3d; }
</style>
</head>
<body>

<div class="container">
    <div class="video-area">
        <video id="video" controls>
            <source id="videoSource" src="" type="video/mp4">
        </video>
        <p class="progresso-label" id="progressoLabel">Carregando...</p>
    </div>

    <div class="texto-area" id="texto">
        <div class="global-toggles">
            <button class="global-btn trad" id="btnTodasTrad">🌐 Ver todas as traduções</button>
            <button class="global-btn dica-g" id="btnTodasDica">💡 Ver todas as dicas</button>
        </div>
        <div id="blocosContainer"></div>
    </div>
</div>

<!-- MODAL EXERCÍCIOS -->
<div id="exModal" class="exmodal" style="display:none">
    <div class="exmodal-overlay" onclick="fecharExercicios()"></div>
    <div class="exmodal-box">
        <div class="exmodal-header">
            <span class="exmodal-titulo">✏️ Exercícios</span>
            <button class="exmodal-close" onclick="fecharExercicios()">✕</button>
        </div>
        <div class="ex-progresso" id="exProgresso">Questão 1 de 4</div>
        <div class="ex-progresso-bar"><div class="ex-progresso-fill" id="exProgressoFill" style="width:0%"></div></div>
        <div id="exCorpo"></div>
    </div>
</div>

<div id="quizletModal" class="qmodal" style="display:none">
    <div class="qmodal-overlay" onclick="fecharQuizlet()"></div>
    <div class="qmodal-box">
        <button class="qmodal-close" onclick="fecharQuizlet()">✕</button>
        <iframe id="quizletFrame" src="" frameborder="0" class="qmodal-frame"></iframe>
    </div>
</div>

<div class="floating-controls">
    <button onclick="video.play()" title="Play">▶</button>
    <button onclick="video.pause()" title="Pause">⏸</button>
    <button onclick="video.currentTime -= 5" title="Voltar 5s">⏪ 5s</button>
    <button onclick="video.currentTime += 5" title="Avançar 5s">⏩ 5s</button>
    <button onclick="previousParagraph()" title="Parágrafo anterior">⬆</button>
    <button onclick="nextParagraph()" title="Próximo parágrafo">⬇</button>
    <button id="toggleScrollBtn" onclick="toggleAutoScroll()">🔒 Auto</button>
    <select id="speedControl">
        <option value="0.6">0.6x</option>
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
    </select>
    <button onclick="voltarHome()" title="Biblioteca de aulas" class="btn-home">📚</button>
</div>

<script>
// ========== VARIÁVEIS GLOBAIS ==========
const video = document.getElementById("video");
const videoSource = document.getElementById("videoSource");
const blocosContainer = document.getElementById("blocosContainer");
const progressoLabel = document.getElementById("progressoLabel");

let autoScroll = true;
let currentBlockIndex = 0;
let lastActiveIndex = -1;
let quizletUrlGlobal = '';

// ========== FUNÇÕES GLOBAIS (acessíveis pelo onclick) ==========

// Função para abrir o modal do Quizlet (GLOBAL)
window.abrirQuizlet = function() {
    const modal = document.getElementById('quizletModal');
    const iframe = document.getElementById('quizletFrame');
    
    if (quizletUrlGlobal) {
        iframe.src = quizletUrlGlobal;
    } else {
        console.error('Quizlet URL não definida');
        iframe.src = 'quizlet.html?quizlet=1';
    }
    
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

// Função para fechar o modal (GLOBAL)
window.fecharQuizlet = function() {
    const modal = document.getElementById('quizletModal');
    modal.style.display = 'none';
    document.body.style.overflow = '';
}

// Função para voltar para a home (GLOBAL)
window.voltarHome = function() {
    window.location.href = 'home.html';
}

// Função toggle item (GLOBAL)
window.toggleItem = function(btn) {
    const bloco = btn.closest('.bloco');
    const tBtns = [...bloco.querySelectorAll('.toggle-btn')];
    const cols = [...bloco.querySelectorAll('.colapsavel')];
    const idx = tBtns.indexOf(btn);
    const alvo = cols[idx];
    if (!alvo) return;
    const aberto = alvo.classList.contains('aberto');
    alvo.classList.toggle('aberto', !aberto);
    btn.classList.toggle('aberto', !aberto);
}

// Função toggle todos (GLOBAL)
window.toggleTodos = function(tipo) {
    const isTrad = tipo === 'trad';
    const colClass = isTrad ? 'trad-col' : 'dica-col';
    const btnClass = isTrad ? 'trad-btn' : 'dica-btn';
    const globalId = isTrad ? 'btnTodasTrad' : 'btnTodasDica';
    
    const cols = [...document.querySelectorAll('.' + colClass)];
    const btns = [...document.querySelectorAll('.' + btnClass)];
    const btnGlobal = document.getElementById(globalId);
    
    const algumFechado = cols.some(c => !c.classList.contains('aberto'));
    
    cols.forEach(c => c.classList.toggle('aberto', algumFechado));
    btns.forEach(b => b.classList.toggle('aberto', algumFechado));
    
    if (isTrad) {
        btnGlobal.textContent = algumFechado ? '🌐 Ocultar todas as traduções' : '🌐 Ver todas as traduções';
    } else {
        btnGlobal.textContent = algumFechado ? '💡 Ocultar todas as dicas' : '💡 Ver todas as dicas';
    }
}

// Funções de scroll (GLOBAL)
window.toggleAutoScroll = function() {
    autoScroll = !autoScroll;
    document.getElementById("toggleScrollBtn").innerHTML = autoScroll ? "🔒 Auto" : "🔓 Livre";
}

window.nextParagraph = function() {
    autoScroll = false;
    document.getElementById("toggleScrollBtn").innerHTML = "🔓 Livre";
    const blocos = document.querySelectorAll(".bloco");
    if (currentBlockIndex < blocos.length - 1) {
        currentBlockIndex++;
        blocos[currentBlockIndex].scrollIntoView({ behavior: "smooth", block: "center" });
    }
}

window.previousParagraph = function() {
    autoScroll = false;
    document.getElementById("toggleScrollBtn").innerHTML = "🔓 Livre";
    if (currentBlockIndex > 0) {
        currentBlockIndex--;
        const blocos = document.querySelectorAll(".bloco");
        blocos[currentBlockIndex].scrollIntoView({ behavior: "smooth", block: "center" });
    }
}

// ========== CARREGAR AULA DO JSON ==========
async function carregarAula() {
    const urlParams = new URLSearchParams(window.location.search);
    const aulaId = urlParams.get('aula') || '1';
    
    try {
        const response = await fetch(`dados/aula${aulaId}.json`);
        const data = await response.json();
        
        document.title = data.titulo;
        document.getElementById('pageTitle').textContent = data.titulo;
        
        videoSource.src = data.videoUrl;
        video.load();
        
        // Armazenar a URL do Quizlet GLOBALMENTE
        quizletUrlGlobal = data.quizletUrl;
        
        renderizarBlocos(data.blocos);
        
    } catch (error) {
        console.error('Erro:', error);
        blocosContainer.innerHTML = '<p style="color:red;text-align:center;">Erro ao carregar aula</p>';
    }
}

// Renderizar blocos
function renderizarBlocos(blocos) {
    blocosContainer.innerHTML = '';
    
    blocos.forEach((bloco, index) => {
        const blocoDiv = document.createElement('div');
        blocoDiv.className = 'bloco';
        blocoDiv.dataset.start = bloco.start;
        
        const mins = Math.floor(bloco.start / 60);
        const secs = bloco.start % 60;
        const tempo = `${mins}:${secs.toString().padStart(2,'0')}`;
        
        blocoDiv.innerHTML = `
            <div class="italiano">
                <span class="timestamp" data-time="${tempo}">(${tempo})</span>
                ${bloco.italiano}
            </div>
            <button class="toggle-btn trad-btn" onclick="toggleItem(this)">🌐 Tradução <span class="seta">▾</span></button>
            <button class="toggle-btn dica-btn" onclick="toggleItem(this)">💡 Dica <span class="seta">▾</span></button>
            <button class="mic-btn" onclick="iniciarPratica(this)">🎙️ Praticar fala</button>
            <button class="ex-btn" onclick="abrirExercicios(this, ${index})">✏️ Exercícios</button>
            <div class="colapsavel trad-col">
                <div class="traducao">${bloco.traducao}</div>
            </div>
            <div class="colapsavel dica-col">
                <div class="dica">${bloco.dica}</div>
            </div>
            <div class="mic-resultado"></div>
            ${bloco.miniAula ? `
                <details>
                    <summary>📘 Mini Aula — ${bloco.miniAula.titulo}</summary>
                    <div class="mini-aula-corpo">${bloco.miniAula.conteudo}</div>
                </details>
            ` : ''}
        `;
        
        blocosContainer.appendChild(blocoDiv);
    });
    
    // Adicionar CTA do Quizlet com onclick direto para a função GLOBAL
    const ctaDiv = document.createElement('div');
    ctaDiv.className = 'quizlet-cta';
    ctaDiv.innerHTML = `
        <div class="quizlet-cta-inner">
            <div class="quizlet-cta-text">
                <span class="quizlet-cta-icon">🎯</span>
                <div>
                    <strong>Pronto para praticar?</strong>
                    <p>Vocabulário completo da aula</p>
                </div>
            </div>
            <button class="quizlet-btn" onclick="abrirQuizlet()">Abrir Quizlet →</button>
        </div>
    `;
    blocosContainer.appendChild(ctaDiv);
    
    // Reaplicar eventos dos timestamps
    document.querySelectorAll(".timestamp").forEach(el => {
        el.addEventListener("click", () => {
            const t = el.dataset.time.split(":");
            video.currentTime = parseInt(t[0]) * 60 + parseInt(t[1]);
            video.play();
        });
    });
    
    // Reiniciar sistema de destaque
    iniciarDestaque();
}

// Sistema de destaque
function iniciarDestaque() {
    const blocos = document.querySelectorAll(".bloco");
    progressoLabel.textContent = `Parágrafo 1 de ${blocos.length}`;
    
    video.addEventListener("timeupdate", () => {
        const t = video.currentTime;
        blocos.forEach((bloco, i) => {
            const ini = parseFloat(bloco.dataset.start);
            const fim = blocos[i+1] ? parseFloat(blocos[i+1].dataset.start) : Infinity;
            if (t >= ini && t < fim) {
                currentBlockIndex = i;
                if (lastActiveIndex !== i) {
                    lastActiveIndex = i;
                    blocos.forEach(b => b.classList.remove("ativo"));
                    bloco.classList.add("ativo");
                    progressoLabel.textContent = `Parágrafo ${i+1} de ${blocos.length}`;
                    if (autoScroll) bloco.scrollIntoView({ behavior: "smooth", block: "center" });
                }
            }
        });
    });
}

// Velocidade
document.getElementById("speedControl").addEventListener("change", function() {
    video.playbackRate = parseFloat(this.value);
});

// Escape para fechar modal
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') fecharQuizlet();
});

// Configurar botões globais
document.getElementById('btnTodasTrad').onclick = () => toggleTodos('trad');
document.getElementById('btnTodasDica').onclick = () => toggleTodos('dica');

// ========== PRÁTICA DE FALA ==========
let recognitionAtiva = null;

window.iniciarPratica = function(btn) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert('Seu navegador não suporta reconhecimento de voz.\nTente Google Chrome.');
        return;
    }

    // Se já está gravando neste botão, para
    if (btn.classList.contains('gravando')) {
        if (recognitionAtiva) recognitionAtiva.stop();
        return;
    }

    // Para qualquer gravação anterior
    if (recognitionAtiva) recognitionAtiva.stop();

    const bloco = btn.closest('.bloco');
    const textoItalianoEl = bloco.querySelector('.italiano');
    // Pega o texto limpo (sem o timestamp)
    const textoCompleto = textoItalianoEl.innerText.replace(/\(\d+:\d+\)\s*/,'').trim().toLowerCase();

    const resultado = bloco.querySelector('.mic-resultado');

    const recognition = new SpeechRecognition();
    recognition.lang = 'it-IT';
    recognition.interimResults = false;
    recognition.maxAlternatives = 3;
    recognitionAtiva = recognition;

    btn.classList.add('gravando');
    btn.innerHTML = '⏹️ Parar';
    resultado.className = 'mic-resultado';
    resultado.style.display = 'none';

    recognition.onresult = function(event) {
        const alternativas = [...event.results[0]].map(a => a.transcript.toLowerCase().trim());
        const melhor = alternativas[0];

        // Normaliza para comparação (remove pontuação)
        const normalizar = t => t.replace(/[.,!?;:"""'']/g,'').trim();
        const textoNorm = normalizar(textoCompleto);
        const melhorNorm = normalizar(melhor);

        // Conta palavras em comum
        const palavrasTexto = textoNorm.split(/\s+/);
        const palavrasFala = melhorNorm.split(/\s+/);
        const emComum = palavrasTexto.filter(p => palavrasFala.includes(p)).length;
        const pct = emComum / palavrasTexto.length;

        resultado.style.display = 'block';
        if (pct >= 0.85) {
            resultado.className = 'mic-resultado acerto';
            resultado.innerHTML = `✅ <strong>Muito bem!</strong> Você disse:<br><em>"${melhor}"</em>`;
        } else if (pct >= 0.5) {
            resultado.className = 'mic-resultado parcial';
            resultado.innerHTML = `🟡 <strong>Quase lá!</strong> Você disse:<br><em>"${melhor}"</em><br><span style="font-size:0.78rem;opacity:0.75">Texto esperado: "${textoCompleto}"</span>`;
        } else {
            resultado.className = 'mic-resultado erro';
            resultado.innerHTML = `❌ <strong>Tente novamente.</strong> Você disse:<br><em>"${melhor}"</em><br><span style="font-size:0.78rem;opacity:0.75">Texto esperado: "${textoCompleto}"</span>`;
        }
    };

    recognition.onerror = function(event) {
        resultado.style.display = 'block';
        resultado.className = 'mic-resultado erro';
        if (event.error === 'no-speech') {
            resultado.innerHTML = '🎙️ Nenhuma fala detectada. Tente novamente.';
        } else if (event.error === 'not-allowed') {
            resultado.innerHTML = '🔒 Permissão de microfone negada. Verifique as configurações do navegador.';
        } else {
            resultado.innerHTML = `⚠️ Erro: ${event.error}`;
        }
    };

    recognition.onend = function() {
        btn.classList.remove('gravando');
        btn.innerHTML = '🎙️ Praticar fala';
        recognitionAtiva = null;
    };

    recognition.start();
};

// Iniciar
carregarAula();

// ========== SISTEMA DE EXERCÍCIOS ==========
let exDados = [];          // todos os exercícios do bloco atual
let exFila = [];           // fila embaralhada para a sessão
let exAtual = 0;           // índice na fila
let exAcertos = 0;
let exRespondido = false;
let exOrdenarSelecionadas = []; // palavras escolhidas no exercício ordenar

// Abre o modal carregando exercícios do JSON
window.abrirExercicios = async function(btn, blocoIndex) {
    const aulaId = new URLSearchParams(window.location.search).get('aula') || '1';
    try {
        const res = await fetch(`dados/exercicios_aula${aulaId}.json`);
        const data = await res.json();
        const paragrafo = data.paragrafos[blocoIndex];
        if (!paragrafo || !paragrafo.exercicios || paragrafo.exercicios.length === 0) {
            alert('Nenhum exercício disponível para este parágrafo ainda.');
            return;
        }
        exDados = paragrafo.exercicios;
        iniciarSessaoExercicios();
    } catch(e) {
        alert('Erro ao carregar exercícios. Verifique se o arquivo JSON existe.');
        console.error(e);
    }
    document.getElementById('exModal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
};

window.fecharExercicios = function() {
    document.getElementById('exModal').style.display = 'none';
    document.body.style.overflow = '';
};

function iniciarSessaoExercicios() {
    // Embaralha e pega até 5 por sessão
    exFila = embaralhar([...exDados]).slice(0, 5);
    exAtual = 0;
    exAcertos = 0;
    renderizarExercicio();
}

function embaralhar(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function atualizarProgresso() {
    const total = exFila.length;
    const atual = exAtual + 1;
    document.getElementById('exProgresso').textContent = `Questão ${atual} de ${total}`;
    document.getElementById('exProgressoFill').style.width = `${(exAtual / total) * 100}%`;
}

function renderizarExercicio() {
    if (exAtual >= exFila.length) {
        mostrarPlacar();
        return;
    }
    exRespondido = false;
    exOrdenarSelecionadas = [];
    atualizarProgresso();
    const ex = exFila[exAtual];
    const corpo = document.getElementById('exCorpo');

    const badgeClasse = {
        'multipla': 'badge-multipla',
        'lacuna':   'badge-lacuna',
        'ordenar':  'badge-ordenar',
        'traduzir': 'badge-traduzir'
    }[ex.tipo] || 'badge-multipla';

    const badgeLabel = {
        'multipla': '🔵 Múltipla escolha',
        'lacuna':   '🟣 Preencher lacuna',
        'ordenar':  '🟡 Ordenar palavras',
        'traduzir': '🟢 Traduzir'
    }[ex.tipo] || ex.tipo;

    let htmlInterativo = '';

    if (ex.tipo === 'multipla') {
        const opcoes = embaralhar([...ex.opcoes]);
        htmlInterativo = `<div class="ex-opcoes">
            ${opcoes.map(op => `<button class="ex-opcao" onclick="responderMultipla(this, '${escapar(op)}', '${escapar(ex.resposta)}')">${op}</button>`).join('')}
        </div>`;

    } else if (ex.tipo === 'lacuna') {
        // Divide a pergunta em partes: texto antes e depois de ___
        const partes = ex.pergunta.split('___');
        htmlInterativo = `
            <div class="ex-lacuna-wrap">
                <span>${partes[0]}</span>
                <input class="ex-lacuna-input" id="exLacunaInput" type="text" placeholder="..." autocomplete="off" autocorrect="off" spellcheck="false" />
                <span>${partes[1] || ''}</span>
            </div>`;

    } else if (ex.tipo === 'ordenar') {
        const palavras = embaralhar([...ex.palavras]);
        htmlInterativo = `
            <div class="ex-area-label">Sua resposta</div>
            <div class="ex-palavras-area" id="exOrdenarArea"></div>
            <div class="ex-area-label" style="margin-top:10px">Palavras disponíveis</div>
            <div class="ex-palavra-banco" id="exPalavraBanco">
                ${palavras.map((p, i) => `<button class="ex-palavra" data-idx="${i}" data-palavra="${escapar(p)}" onclick="selecionarPalavra(this)">${p}</button>`).join('')}
            </div>`;

    } else if (ex.tipo === 'traduzir') {
        htmlInterativo = `<textarea class="ex-textarea" id="exTraduzirInput" rows="3" placeholder="Digite sua tradução em português..."></textarea>`;
    }

    // Monta pergunta (para lacuna, a pergunta já tem ___ embutido — não duplicamos)
    const perguntaHTML = ex.tipo === 'lacuna'
        ? `<div class="ex-pergunta">${ex.enunciado || 'Complete a frase:'}</div>`
        : `<div class="ex-pergunta">${ex.pergunta}</div>`;

    corpo.innerHTML = `
        <span class="ex-tipo-badge ${badgeClasse}">${badgeLabel}</span>
        ${perguntaHTML}
        ${htmlInterativo}
        <div class="ex-feedback" id="exFeedback"></div>
        <div class="ex-acoes">
            <button class="ex-confirmar" id="exConfirmar" onclick="confirmarResposta()">Confirmar</button>
            <button class="ex-proximo" id="exProximo" onclick="proximoExercicio()">Próximo →</button>
        </div>
    `;

    // Focus automático nos inputs
    if (ex.tipo === 'lacuna') {
        setTimeout(() => document.getElementById('exLacunaInput')?.focus(), 100);
        document.getElementById('exLacunaInput').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !exRespondido) confirmarResposta();
        });
    }
    if (ex.tipo === 'traduzir') {
        setTimeout(() => document.getElementById('exTraduzirInput')?.focus(), 100);
    }
}

// Selecionar palavra (exercício ordenar)
window.selecionarPalavra = function(btn) {
    if (exRespondido) return;
    const palavra = btn.dataset.palavra;
    exOrdenarSelecionadas.push(palavra);
    btn.classList.add('usada');
    const area = document.getElementById('exOrdenarArea');
    const chip = document.createElement('button');
    chip.className = 'ex-palavra selecionada';
    chip.textContent = palavra;
    chip.dataset.palavra = palavra;
    chip.dataset.bancoIdx = btn.dataset.idx;
    chip.onclick = function() {
        if (exRespondido) return;
        // Devolve ao banco
        exOrdenarSelecionadas = exOrdenarSelecionadas.filter((_, i, arr) => {
            const last = arr.lastIndexOf(palavra);
            if (i === last) { arr.splice(last, 1); return false; }
            return true;
        });
        // Versão mais simples: remove a última ocorrência
        const idx = exOrdenarSelecionadas.lastIndexOf(palavra);
        if (idx !== -1) exOrdenarSelecionadas.splice(idx, 1);
        // reativa botão no banco
        document.querySelector(`.ex-palavra-banco .ex-palavra[data-idx="${btn.dataset.idx}"]`)?.classList.remove('usada');
        chip.remove();
    };
    area.appendChild(chip);
};

// Confirmar resposta
window.confirmarResposta = function() {
    if (exRespondido) return;
    const ex = exFila[exAtual];
    let certa = false;
    let feedbackExtra = '';

    if (ex.tipo === 'multipla') {
        // já tratado no click de cada opção — aqui não faz nada extra
        return;
    }

    if (ex.tipo === 'lacuna') {
        const input = document.getElementById('exLacunaInput');
        const resposta = input.value.trim().toLowerCase();
        const esperada = ex.resposta.toLowerCase();
        certa = resposta === esperada || ex.alternativas?.map(a => a.toLowerCase()).includes(resposta);
        input.classList.add(certa ? 'certa' : 'errada');
        if (!certa) feedbackExtra = `<br>Resposta correta: <strong>${ex.resposta}</strong>`;
    }

    if (ex.tipo === 'ordenar') {
        const frase = exOrdenarSelecionadas.join(' ').toLowerCase().trim();
        const esperada = ex.resposta.toLowerCase().trim();
        certa = frase === esperada;
        if (!certa) feedbackExtra = `<br>Resposta correta: <strong>${ex.resposta}</strong>`;
        // Colore as palavras na área
        document.querySelectorAll('#exOrdenarArea .ex-palavra').forEach(p => {
            p.style.borderColor = certa ? '#5cb85c' : '#e05c5c';
            p.style.background = certa ? '#e8f5ef' : '#fff0f0';
        });
    }

    if (ex.tipo === 'traduzir') {
        const input = document.getElementById('exTraduzirInput');
        const resposta = input.value.trim().toLowerCase();
        // Comparação flexível: verifica palavras-chave
        const palavrasChave = ex.palavrasChave || ex.resposta.toLowerCase().split(/\s+/).filter(p => p.length > 3);
        const acertos = palavrasChave.filter(p => resposta.includes(p)).length;
        certa = acertos >= Math.ceil(palavrasChave.length * 0.6);
        input.style.borderColor = certa ? '#5cb85c' : '#e05c5c';
        feedbackExtra = `<br>Uma resposta válida: <em>${ex.resposta}</em>`;
    }

    mostrarFeedback(certa, ex.explicacao, feedbackExtra);
    if (certa) exAcertos++;
    exRespondido = true;
    document.getElementById('exConfirmar').style.display = 'none';
    document.getElementById('exProximo').style.display = 'block';
};

// Responder múltipla escolha (tratado direto no click)
window.responderMultipla = function(btn, opcao, resposta) {
    if (exRespondido) return;
    exRespondido = true;
    const certa = opcao === resposta;
    if (certa) exAcertos++;

    document.querySelectorAll('.ex-opcao').forEach(b => {
        b.disabled = true;
        if (b.dataset && b.textContent.trim() === resposta) b.classList.add('certa');
    });
    btn.classList.add(certa ? 'certa' : 'errada');

    const ex = exFila[exAtual];
    mostrarFeedback(certa, ex.explicacao, certa ? '' : `<br>Resposta correta: <strong>${resposta}</strong>`);
    document.getElementById('exConfirmar').style.display = 'none';
    document.getElementById('exProximo').style.display = 'block';
};

function mostrarFeedback(certa, explicacao, extra) {
    const fb = document.getElementById('exFeedback');
    fb.className = 'ex-feedback ' + (certa ? 'certa' : 'errada');
    fb.innerHTML = (certa ? '✅ <strong>Correto!</strong>' : '❌ <strong>Incorreto.</strong>') +
        (extra || '') +
        (explicacao ? `<br><span style="opacity:0.8;font-size:0.8rem">${explicacao}</span>` : '');
}

window.proximoExercicio = function() {
    exAtual++;
    renderizarExercicio();
};

function mostrarPlacar() {
    const total = exFila.length;
    const pct = Math.round((exAcertos / total) * 100);
    const emoji = pct >= 80 ? '🏆' : pct >= 50 ? '👍' : '💪';
    const msg = pct >= 80 ? 'Excelente trabalho!' : pct >= 50 ? 'Bom progresso!' : 'Continue praticando!';

    document.getElementById('exProgresso').textContent = 'Resultado final';
    document.getElementById('exProgressoFill').style.width = '100%';
    document.getElementById('exCorpo').innerHTML = `
        <div class="ex-placar">
            <div class="ex-placar-emoji">${emoji}</div>
            <div class="ex-placar-titulo">${msg}</div>
            <div class="ex-placar-score">${exAcertos}/${total} <span style="font-size:1rem;color:#999">(${pct}%)</span></div>
            <div class="ex-placar-sub">Quer tentar de novo com novas questões?</div>
            <button class="ex-reiniciar" onclick="iniciarSessaoExercicios()">🔄 Praticar novamente</button>
        </div>
    `;
}

function escapar(str) {
    return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}
</script>
</body>
</html>
